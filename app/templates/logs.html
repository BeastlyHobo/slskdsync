{% extends 'base.html' %}
{% block content %}

<div class="page-head" style="margin-bottom:.55rem">
  <h1 class="page-title">Logs</h1>
  <p class="page-sub">Live application logs — persisted to disk, last 1000 lines.</p>
</div>

<div class="lg-wrap">
  <!-- Filter bar -->
  <div class="lg-bar">
    <input id="log-search" class="lg-input" type="search" placeholder="Filter logs…" oninput="renderLogs()">
    <select id="log-component" class="lg-select" onchange="renderLogs()">
      <option value="">All components</option>
    </select>
    <label class="lg-toggle">
      <input type="checkbox" id="log-autoscroll" checked> Auto-scroll
    </label>
  </div>

  <!-- Level chips -->
  <div class="lg-chips">
    <button class="lg-chip active" data-lv="all"     onclick="setLevel('all',this)">All</button>
    <button class="lg-chip"        data-lv="debug"   onclick="setLevel('debug',this)">Debug</button>
    <button class="lg-chip"        data-lv="info"    onclick="setLevel('info',this)">Info</button>
    <button class="lg-chip"        data-lv="warning" onclick="setLevel('warning',this)">Warn</button>
    <button class="lg-chip"        data-lv="error"   onclick="setLevel('error',this)">Error</button>
  </div>

  <!-- Toolbar -->
  <div class="lg-toolbar">
    <button type="button" class="log-toolbar-btn" id="log-copy-btn" onclick="copyLogs()">Copy</button>
    <a id="log-dl-btn" class="log-toolbar-btn" download="slskdsync.log">Download</a>
    <button type="button" class="log-toolbar-btn" onclick="clearDisplay()">Clear display</button>
    <span class="log-count" id="log-count"></span>
  </div>

  <!-- Log output -->
  <div id="log-box" class="log-box lg-box"></div>
</div>

<style>
.lg-bar { display:flex; gap:.45rem; align-items:center; flex-wrap:wrap; margin-bottom:.5rem; }
.lg-input {
  flex:1; min-width:160px; box-sizing:border-box;
  padding:.45rem .9rem; border-radius:var(--radius-pill);
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  font-size:.82rem; font-family:var(--font-ui); outline:none;
}
.lg-input:focus { border-color:var(--accent); }
.lg-select {
  font-size:.74rem; padding:.4rem .6rem; border-radius:var(--radius-pill);
  background:var(--surface2); color:var(--text); border:1px solid var(--border); cursor:pointer;
}
.lg-toggle {
  display:flex; align-items:center; gap:.35rem; font-size:.74rem;
  color:var(--text-muted); white-space:nowrap; cursor:pointer;
}
.lg-chips { display:flex; gap:.35rem; flex-wrap:wrap; margin-bottom:.55rem; }
.lg-chip {
  flex-shrink:0; font-size:.72rem; font-weight:600; padding:.32rem .8rem;
  border-radius:var(--radius-pill); background:var(--surface2);
  border:1px solid var(--border); color:var(--text-muted); cursor:pointer;
  font-family:var(--font-ui); transition:background .14s, color .14s, border-color .14s;
}
.lg-chip:hover { background:var(--surface3); color:var(--text); }
.lg-chip.active { background:var(--accent-strong); color:var(--accent-contrast); border-color:transparent; }
.lg-chip[data-lv="warning"].active { background:var(--warn); color:#1a1205; }
.lg-chip[data-lv="error"].active   { background:var(--err);  color:#fff; }
.lg-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:.4rem; }
.lg-box {
  height:calc(100dvh - 340px); min-height:240px; max-height:none;
  display:block;
}
.lg-box .log-empty {
  display:flex; align-items:center; justify-content:center; height:100%;
  text-align:center; color:var(--text-faint);
}
</style>

<script>
let _allLines  = [];
let _level     = 'all';
let _pollTimer = null;

const LEVEL_RE = /\[(DEBUG|INFO|WARNING|ERROR|CRITICAL)\]/;
const COMP_RE  = /\[(?:DEBUG|INFO|WARNING|ERROR|CRITICAL)\]\s+(\[[^\]]+\])/;

function levelOf(line)     { const m = line.match(LEVEL_RE); return m ? m[1].toLowerCase() : 'info'; }
function componentOf(line) { const m = line.match(COMP_RE);  return m ? m[1] : ''; }
function logClass(line)    { const lv = levelOf(line); return lv === 'critical' ? 'log-error' : 'log-' + lv; }
function escHtml(s) { return String(s||'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function matchesLevel(line) {
  if (_level === 'all') return true;
  const lv = levelOf(line);
  if (_level === 'error') return lv === 'error' || lv === 'critical';
  return lv === _level;
}

function currentFilter() {
  const q    = (document.getElementById('log-search').value || '').toLowerCase();
  const comp = document.getElementById('log-component').value;
  return _allLines.filter(line => {
    if (!matchesLevel(line)) return false;
    if (comp && componentOf(line) !== comp) return false;
    if (q && !line.toLowerCase().includes(q)) return false;
    return true;
  });
}

function setLevel(val, btn) {
  _level = val;
  document.querySelectorAll('.lg-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLogs();
}

function renderLogs() {
  const box = document.getElementById('log-box');
  const visible = currentFilter();
  document.getElementById('log-count').textContent = visible.length + ' / ' + _allLines.length + ' lines';

  const sel = window.getSelection();
  if (sel && sel.toString().length > 0 && box.contains(sel.anchorNode)) return;

  const atBottom = box.scrollHeight - box.scrollTop - box.clientHeight < 60;
  if (!visible.length) {
    box.innerHTML = '<span class="log-empty">' +
      (_allLines.length ? 'No lines match the current filter.' : '(no log entries yet)') + '</span>';
    return;
  }
  box.innerHTML = visible.map(line => `<div class="log-line ${logClass(line)}">${escHtml(line)}</div>`).join('');
  updateDownloadLink(visible);
  if (atBottom && document.getElementById('log-autoscroll').checked) box.scrollTop = box.scrollHeight;
}

function rebuildComponentSelect() {
  const comps = [...new Set(_allLines.map(componentOf).filter(Boolean))].sort();
  const sel = document.getElementById('log-component');
  const prev = sel.value;
  sel.innerHTML = '<option value="">All components</option>' +
    comps.map(c => `<option value="${escHtml(c)}"${c===prev?' selected':''}>${escHtml(c)}</option>`).join('');
}

function fetchLogs() {
  fetch('/api/logs?n=1000').then(r => r.json()).then(d => {
    _allLines = d.lines || [];
    rebuildComponentSelect();
    renderLogs();
  }).catch(() => {});
}

function copyLogs() {
  const btn = document.getElementById('log-copy-btn');
  navigator.clipboard.writeText(currentFilter().join('\n')).then(() => {
    btn.textContent = 'Copied!'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    const range = document.createRange();
    range.selectNodeContents(document.getElementById('log-box'));
    const s = window.getSelection(); s.removeAllRanges(); s.addRange(range);
  });
}

function updateDownloadLink(lines) {
  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const a = document.getElementById('log-dl-btn');
  if (a._blobUrl) URL.revokeObjectURL(a._blobUrl);
  a._blobUrl = URL.createObjectURL(blob);
  a.href = a._blobUrl;
}

function clearDisplay() {
  _allLines = [];
  document.getElementById('log-box').innerHTML =
    '<span class="log-empty">(display cleared — live logs resume on next poll)</span>';
  document.getElementById('log-count').textContent = '';
}

fetchLogs();
_pollTimer = setInterval(fetchLogs, 3000);
</script>

{% endblock %}
