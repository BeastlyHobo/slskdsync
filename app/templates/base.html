<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#18181c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="slskdsync">
  <title>slskdsync</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<header class="app-header">
  <h1>slskdsync</h1>
  <a href="/logout" class="header-action">sign out</a>
</header>

<main>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>

<nav class="bottom-nav">
  <a href="/search" class="{{ 'active' if request.path == '/search' else '' }}">
    <span class="nav-icon">🔍</span>Search
  </a>
  <a href="/discover" class="{{ 'active' if request.path == '/discover' else '' }}">
    <span class="nav-icon">✨</span>Discover
  </a>
  <a href="/" class="{{ 'active' if request.path == '/' else '' }}">
    <span class="nav-icon">📥</span>Queue
  </a>
  <a href="/library" class="{{ 'active' if request.path == '/library' else '' }}">
    <span class="nav-icon">🎵</span>Library
  </a>
  <a href="/playlists" class="{{ 'active' if request.path == '/playlists' else '' }}">
    <span class="nav-icon">📋</span>Playlists
  </a>
  <a href="/settings" class="{{ 'active' if request.path == '/settings' else '' }}">
    <span class="nav-icon">⚙️</span>Settings
  </a>
</nav>

<div class="toast" id="toast"></div>

<script>
function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2500);
}
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>

</body>
</html>
