{% extends 'base.html' %}
{% block content %}

<style>
/* ── Genre chips ──────────────────────────────────────────── */
.genre-chip {
  padding:.32rem .9rem; background:var(--surface2); border:1.5px solid var(--border);
  border-radius:var(--radius-pill); color:var(--text-muted); font-size:.74rem; cursor:pointer;
  white-space:nowrap; transition:all .12s; font-weight:600; flex-shrink:0;
}
.genre-chip:hover { border-color:var(--accent); color:var(--accent); }
.genre-chip.active { background:var(--accent); border-color:var(--accent); color:#080810; font-weight:700; }

/* ── ListenBrainz compact track list ─────────────────────── */
.disc-track-list { display:flex; flex-direction:column; gap:.4rem; }
.track-card.track-in-lib { border-left:3px solid var(--success-text); }
.in-lib-badge { font-size:.62rem; font-weight:700; color:var(--success-text);
                background:var(--success-bg); border-radius:var(--radius-pill); padding:1px 6px;
                margin-left:.25rem; vertical-align:middle; }

/* ── Tile action buttons ─────────────────────────────────── */
.btn-tile-slsk { background:#1e4a78; color:#a8d0ff; font-size:.68rem; font-weight:700;
                 padding:.28rem .7rem; border:none; border-radius:var(--radius-pill);
                 cursor:pointer; white-space:nowrap; min-width:80px; }
.btn-tile-mono { background:#3a1a6e; color:#c8a8ff; font-size:.68rem; font-weight:700;
                 padding:.28rem .7rem; border:none; border-radius:var(--radius-pill);
                 cursor:pointer; white-space:nowrap; min-width:80px; }
.btn-tile-slsk:active, .btn-tile-mono:active { transform:scale(.95); }
.btn-queued { background:var(--surface3) !important; color:var(--text-muted) !important; cursor:default !important; }

/* ── Radio results ───────────────────────────────────────── */
.radio-results { margin-top:.45rem; padding:.5rem .6rem;
                 background:var(--surface); border-radius:var(--radius);
                 border-left:3px solid var(--accent); box-shadow:var(--shadow-sm); }
.radio-label { font-size:.72rem; color:var(--text-muted); margin-bottom:.4rem; font-weight:700; }
.dl-btns { display:flex; gap:.3rem; flex-shrink:0; }
.btn-radio { background:var(--surface2); color:var(--accent); border:1.5px solid var(--border);
             font-size:.68rem; padding:.3rem .6rem; border-radius:var(--radius-pill);
             font-weight:700; cursor:pointer; }
.btn-radio:hover { border-color:var(--accent); background:var(--surface3); }

/* ── Loading / empty ─────────────────────────────────────── */
.disc-loading { display:flex; align-items:center; gap:.5rem; justify-content:center;
                padding:2rem 1rem; color:var(--text-muted); font-size:.84rem; }
.disc-empty { text-align:center; padding:1.5rem; color:var(--text-muted); font-size:.84rem; }
.shelf-spinner { width:16px; height:16px; border:2px solid var(--border);
                 border-top-color:var(--accent); border-radius:50%;
                 animation:spin .6s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Genre toggle chevron ────────────────────────────────── */
#genre-toggle-wrap { overflow:hidden; max-height:0; transition:max-height .25s; margin-bottom:0; }
#genre-toggle-wrap.open { max-height:80px; margin-bottom:.55rem; }
</style>

<div style="padding:.25rem 0 1rem">

  <!-- ── Top Charts ──────────────────────────────────────── -->
  <div class="shelf">
    <div class="shelf-hdr">
      <span class="shelf-hdr-title">Top Charts</span>
      <span class="shelf-hdr-link" id="genre-toggle-btn" onclick="toggleGenres()">Genres ›</span>
    </div>
    <div id="genre-toggle-wrap">
      <div class="shelf-scroll" id="genre-chips">
        <button class="genre-chip active" data-genre-id="" onclick="selectGenre(this,'')">All</button>
      </div>
    </div>
    <div class="shelf-scroll" id="charts-area">
      <div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>
    </div>
  </div>

  {% if apple_configured %}
  <!-- ── New Releases ────────────────────────────────────── -->
  <div class="shelf">
    <div class="shelf-hdr">
      <span class="shelf-hdr-title">New Releases</span>
    </div>
    <div class="shelf-scroll" id="apple-area">
      <div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>
    </div>
  </div>
  {% endif %}

  {% if lb_username %}
  <!-- ── For You (ListenBrainz) ──────────────────────────── -->
  <div class="shelf">
    <div class="shelf-hdr">
      <span class="shelf-hdr-title">For You</span>
      <span class="shelf-hdr-sub">Your top tracks this month</span>
    </div>
    <div class="disc-track-list" id="lb-area">
      <div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>
    </div>
  </div>

  <!-- ── Listening History (ListenBrainz) ───────────────── -->
  <div class="shelf">
    <div class="shelf-hdr">
      <span class="shelf-hdr-title">Listening History</span>
      <span class="shelf-hdr-sub">Recently scrobbled</span>
    </div>
    <div class="disc-track-list" id="lb-history-area">
      <div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>
    </div>
  </div>
  {% endif %}

</div>

<script>
// ── Library index ─────────────────────────────────────────────────────────
let libIndex = new Set();
fetch('/api/library/index').then(r => r.json()).then(items => {
  libIndex = new Set(items.map(i => (i.a||'').toLowerCase().trim() + '||' + (i.t||'').toLowerCase().trim()));
}).catch(() => {});

// ── Cache ─────────────────────────────────────────────────────────────────
const _cache = {};

// ── Genre toggle ──────────────────────────────────────────────────────────
let _genresOpen = false;
let _genresLoaded = false;

function toggleGenres() {
  _genresOpen = !_genresOpen;
  document.getElementById('genre-toggle-wrap').classList.toggle('open', _genresOpen);
  document.getElementById('genre-toggle-btn').textContent = _genresOpen ? 'Genres ↑' : 'Genres ›';
  if (!_genresLoaded) loadGenres();
}

function loadGenres() {
  if (_genresLoaded) return;
  _genresLoaded = true;
  fetch('/api/discover/genres')
    .then(r => r.json())
    .then(genres => {
      const container = document.getElementById('genre-chips');
      const chips = genres.map(g =>
        `<button class="genre-chip" data-genre-id="${esc(g.id)}" onclick="selectGenre(this,'${esc(g.id)}')">${esc(g.name)}</button>`
      ).join('');
      container.insertAdjacentHTML('beforeend', chips);
    })
    .catch(() => {});
}

function selectGenre(btn, genreId) {
  document.querySelectorAll('#genre-chips .genre-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  delete _cache.charts;
  loadCharts(genreId);
}

// ── Charts ────────────────────────────────────────────────────────────────
function loadCharts(genreId) {
  const area = document.getElementById('charts-area');
  area.innerHTML = '<div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>';
  const url = genreId ? `/api/discover/genre/${genreId}` : '/api/discover/charts';
  fetch(url)
    .then(r => r.json())
    .then(data => {
      const tracks = data.tracks || data;
      _cache.charts = tracks;
      renderShelf(area, tracks);
    })
    .catch(() => { area.innerHTML = '<div class="disc-empty">Failed to load charts.</div>'; });
}

// ── Apple Music (New Releases) ────────────────────────────────────────────
function loadApple() {
  const area = document.getElementById('apple-area');
  if (!area) return;
  area.innerHTML = '<div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>';
  fetch('/api/discover/apple?sub=new')
    .then(r => r.json())
    .then(items => {
      _cache.apple = items;
      renderShelf(area, items);
    })
    .catch(() => { area.innerHTML = '<div class="disc-empty">Failed to load Apple Music data.</div>'; });
}

// ── ListenBrainz ──────────────────────────────────────────────────────────
function loadListenBrainz() {
  const area = document.getElementById('lb-area');
  if (!area) return;
  area.innerHTML = '<div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>';
  fetch('/api/discover/listenbrainz')
    .then(r => r.json())
    .then(items => {
      if (items.error) {
        area.innerHTML = `<div class="disc-empty">${esc(items.error)}</div>`;
        return;
      }
      _cache.lb = items;
      renderTrackList(area, items);
    })
    .catch(() => { area.innerHTML = '<div class="disc-empty">Failed to load recommendations.</div>'; });
}

function loadLbHistory() {
  const area = document.getElementById('lb-history-area');
  if (!area) return;
  area.innerHTML = '<div class="disc-loading"><span class="shelf-spinner"></span>&nbsp;Loading…</div>';
  fetch('/api/discover/listenbrainz/history')
    .then(r => r.json())
    .then(items => {
      if (items.error) {
        area.innerHTML = `<div class="disc-empty">${esc(items.error)}</div>`;
        return;
      }
      renderTrackList(area, items);
    })
    .catch(() => { area.innerHTML = '<div class="disc-empty">Failed to load history.</div>'; });
}

// ── Render: horizontal shelf of tiles ────────────────────────────────────
function renderShelf(container, items) {
  if (!items || !items.length) {
    container.innerHTML = '<div class="disc-empty">Nothing found.</div>';
    return;
  }
  container.innerHTML = items.map(item => tilHtml(item)).join('');
}

function tilHtml(t) {
  const libKey = (t.artist||'').toLowerCase().trim() + '||' + (t.title||'').toLowerCase().trim();
  const inLib = libIndex.has(libKey);
  const isAlbum = t.type === 'album';
  const label = isAlbum ? esc(t.title) : esc(t.title);
  const sub   = esc(t.artist || '');
  const artHtml = t.cover
    ? `<img class="shelf-tile-art" src="${esc(t.cover)}" alt="" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
        ><div class="shelf-tile-ph" style="display:none">${isAlbum ? '💿' : '🎵'}</div>`
    : `<div class="shelf-tile-ph">${isAlbum ? '💿' : '🎵'}</div>`;

  const radioBtn = (!isAlbum && t.artist_id)
    ? `<button class="btn-radio radio-btn"
         data-artist-id="${esc(t.artist_id)}"
         data-artist="${esc(t.artist||'')}"
         style="font-size:.62rem;padding:.2rem .55rem;margin-top:.1rem">↺ Radio</button>`
    : '';

  const dlBtns = isAlbum ? '' : `
    <button class="btn-tile-slsk dl-btn"
      data-source="slskd"
      data-title="${esc(t.title)}" data-artist="${esc(t.artist||'')}"
      data-album="${esc(t.album||'')}" data-cover="${esc(t.cover||'')}">Soulseek</button>
    <button class="btn-tile-mono dl-btn"
      data-source="monochrome"
      data-title="${esc(t.title)}" data-artist="${esc(t.artist||'')}"
      data-album="${esc(t.album||'')}" data-cover="${esc(t.cover||'')}">TIDAL</button>
    ${radioBtn}`;

  return `<div class="shelf-tile${inLib ? ' track-in-lib' : ''}" onclick="tileClick(this)">
    ${artHtml}
    ${inLib ? '<div class="shelf-tile-lib"></div>' : ''}
    <div class="tile-actions">${dlBtns || '<span style="color:var(--text-muted);font-size:.72rem">Album</span>'}</div>
    <div class="shelf-tile-title">${label}</div>
    <div class="shelf-tile-sub">${sub}</div>
  </div>`;
}

// ── Render: compact vertical track list (ListenBrainz) ───────────────────
function renderTrackList(container, tracks) {
  if (!tracks || !tracks.length) {
    container.innerHTML = '<div class="disc-empty">No tracks found.</div>';
    return;
  }
  container.innerHTML = tracks.map(t => trackCardHtml(t)).join('');
}

function trackCardHtml(t) {
  const libKey = (t.artist||'').toLowerCase().trim() + '||' + (t.title||'').toLowerCase().trim();
  const inLib = libIndex.has(libKey);
  return `
  <div class="track-card${inLib ? ' track-in-lib' : ''}">
    ${t.cover
      ? `<img class="cover" src="${esc(t.cover)}" alt="" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="cover-placeholder" style="display:none">🎵</div>`
      : `<div class="cover-placeholder">🎵</div>`}
    <div class="track-info">
      <div class="track-title">${esc(t.title)}${inLib ? ' <span class="in-lib-badge">✓ Library</span>' : ''}</div>
      <div class="track-sub">${esc(t.artist||'')}${t.album ? ' · ' + esc(t.album) : ''}</div>
    </div>
    <div class="dl-btns">
      <button class="btn btn-slsk dl-btn"
        data-source="slskd" data-title="${esc(t.title)}"
        data-artist="${esc(t.artist||'')}" data-album="${esc(t.album||'')}"
        data-cover="${esc(t.cover||'')}">Soulseek</button>
      <button class="btn btn-mono dl-btn"
        data-source="monochrome" data-title="${esc(t.title)}"
        data-artist="${esc(t.artist||'')}" data-album="${esc(t.album||'')}"
        data-cover="${esc(t.cover||'')}">TIDAL</button>
      ${t.artist_id
        ? `<button class="btn btn-radio radio-btn"
               data-artist-id="${esc(t.artist_id)}"
               data-artist="${esc(t.artist||'')}">↺ Radio</button>`
        : ''}
    </div>
  </div>`;
}

// ── Tile click: toggle action overlay; close others ───────────────────────
function tileClick(tile) {
  const wasActive = tile.classList.contains('active');
  document.querySelectorAll('.shelf-tile.active').forEach(t => t.classList.remove('active'));
  if (!wasActive) tile.classList.add('active');
}

document.addEventListener('click', e => {
  // Close active tile when clicking outside
  if (!e.target.closest('.shelf-tile')) {
    document.querySelectorAll('.shelf-tile.active').forEach(t => t.classList.remove('active'));
  }

  // Download button
  const dlBtn = e.target.closest('.dl-btn');
  if (dlBtn && !dlBtn.classList.contains('btn-queued')) {
    e.stopPropagation();
    queueDl(dlBtn, {
      title:  dlBtn.dataset.title,
      artist: dlBtn.dataset.artist,
      album:  dlBtn.dataset.album,
      cover:  dlBtn.dataset.cover,
    }, dlBtn.dataset.source);
    return;
  }

  // Artist radio
  const radioBtn = e.target.closest('.radio-btn');
  if (radioBtn) {
    e.stopPropagation();
    loadArtistRadio(radioBtn);
    return;
  }
});

// ── Artist radio ──────────────────────────────────────────────────────────
function loadArtistRadio(btn) {
  const artistId = btn.dataset.artistId;
  const artistName = btn.dataset.artist;
  const tile = btn.closest('.shelf-tile');
  const origText = btn.textContent;
  btn.textContent = '…';
  btn.disabled = true;
  fetch(`/api/discover/artist-radio/${artistId}`)
    .then(r => r.json())
    .then(tracks => {
      btn.textContent = origText;
      btn.disabled = false;
      // Show radio results below the shelf
      const shelf = tile ? tile.closest('.shelf') : null;
      if (!shelf) return;
      let existing = shelf.nextElementSibling;
      if (existing && existing.classList.contains('radio-results')) existing.remove();
      if (!tracks || !tracks.length) return;
      const div = document.createElement('div');
      div.className = 'radio-results';
      div.innerHTML = `<div class="radio-label">↺ Similar to ${esc(artistName)}</div>
        <div class="disc-track-list">` +
        tracks.slice(0, 10).map(t => trackCardHtml(t)).join('') +
        `</div>`;
      shelf.insertAdjacentElement('afterend', div);
      document.querySelectorAll('.shelf-tile.active').forEach(t => t.classList.remove('active'));
    })
    .catch(() => {
      btn.textContent = origText;
      btn.disabled = false;
    });
}

// ── Download ──────────────────────────────────────────────────────────────
function queueDl(btn, item, source) {
  const origText = btn.textContent;
  btn.textContent = '…';
  btn.disabled = true;
  fetch('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ artist:item.artist, album:item.album, title:item.title, cover:item.cover, source }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      btn.textContent = '✓';
      btn.classList.add('btn-queued');
      showToast('Queued: ' + item.title);
    } else {
      btn.textContent = '✗';
      showToast('Error: ' + (d.error || 'Unknown'), 3500);
      setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
    }
  })
  .catch(() => {
    btn.textContent = origText;
    btn.disabled = false;
    showToast('Network error', 3000);
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtDur(s) {
  if (!s) return '';
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── Desktop: convert vertical wheel to horizontal scroll on shelves ───────
document.addEventListener('wheel', e => {
  const shelf = e.target.closest('.shelf-scroll');
  if (!shelf || e.deltaY === 0) return;
  e.preventDefault();
  shelf.scrollLeft += e.deltaY * 1.5;
}, { passive: false });

// ── Init ──────────────────────────────────────────────────────────────────
loadCharts('');
loadApple();
loadListenBrainz();
loadLbHistory();
</script>

{% endblock %}
