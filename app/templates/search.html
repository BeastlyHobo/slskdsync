{% extends 'base.html' %}
{% block content %}

<div class="search-wrap">
  <div class="search-inner">
    <input id="q" class="search-input" type="search"
      placeholder="Search for artist, album, or track…" autocomplete="off" autofocus>
    <button class="search-clear" id="clear-btn" title="Clear">✕</button>
  </div>
  <div class="tab-bar" id="tab-bar">
    <button class="tab active" data-tab="track">Tracks</button>
    <button class="tab" data-tab="artist">Artists</button>
    <button class="tab" data-tab="album">Albums</button>
  </div>
</div>

<!-- search history chips -->
<div id="search-history" style="display:none;padding:.3rem 0 .1rem;display:flex;flex-wrap:wrap;gap:.3rem"></div>

<!-- breadcrumb shown when drilling into artist/album -->
<div id="breadcrumb" class="breadcrumb hidden"></div>

<div id="results-area">
  <div class="empty-state">
    <div class="empty-icon">🎵</div>
    <p>Search to discover music,<br>then download via Soulseek or TIDAL</p>
  </div>
</div>

<script>
const input = document.getElementById('q');
const clearBtn = document.getElementById('clear-btn');
const area = document.getElementById('results-area');
const breadcrumbEl = document.getElementById('breadcrumb');
const tabBar = document.getElementById('tab-bar');

let activeTab = 'track';
let debounce = null;
let navStack = [];

// Library index: Set of "artist||title" keys for already-downloaded check
// ── Search history ────────────────────────────────────────────────────────
const HISTORY_KEY = 'search_history';
const historyEl = document.getElementById('search-history');
function loadHistory() { try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch { return []; } }
function saveHistory(q) {
  let h = loadHistory().filter(x => x !== q);
  h.unshift(q);
  h = h.slice(0, 10);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
  renderHistory();
}
function renderHistory() {
  const h = loadHistory();
  if (!h.length) { historyEl.style.display = 'none'; return; }
  historyEl.style.display = 'flex';
  historyEl.innerHTML = h.map(q =>
    `<button class="hist-chip" onclick="useHistory(this)">${esc(q)}</button>`
  ).join('');
}
function useHistory(btn) {
  input.value = btn.textContent;
  clearBtn.classList.add('visible');
  navStack = [];
  renderBreadcrumb();
  triggerSearch(btn.textContent);
}
renderHistory();

let libIndex = new Set();
fetch('/api/library/index').then(r => r.json()).then(items => {
  libIndex = new Set(items.map(i => i.a + '||' + i.t));
}).catch(() => {});

// Restore last search on page load
(function() {
  const q = sessionStorage.getItem('ss_query');
  const tab = sessionStorage.getItem('ss_tab');
  if (q) {
    input.value = q;
    clearBtn.classList.add('visible');
    if (tab) {
      activeTab = tab;
      tabBar.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    }
    triggerSearch(q);
  }
})();

// ── Tabs ──────────────────────────────────────────────────────────────────
tabBar.addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  tabBar.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  activeTab = btn.dataset.tab;
  sessionStorage.setItem('ss_tab', activeTab);
  navStack = [];
  renderBreadcrumb();
  const q = input.value.trim();
  if (q.length >= 2) triggerSearch(q);
});

// ── Search input ──────────────────────────────────────────────────────────
input.addEventListener('input', () => {
  clearBtn.classList.toggle('visible', input.value.length > 0);
  clearTimeout(debounce);
  const q = input.value.trim();
  if (!q) { reset(); return; }
  if (q.length < 2) return;
  navStack = [];
  renderBreadcrumb();
  debounce = setTimeout(() => triggerSearch(q), 350);
});

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('visible');
  reset();
  input.focus();
});

function reset() {
  sessionStorage.removeItem('ss_query');
  sessionStorage.removeItem('ss_tab');
  navStack = [];
  renderBreadcrumb();
  area.innerHTML = '<div class="empty-state"><div class="empty-icon">🎵</div><p>Search to discover music</p></div>';
}

function triggerSearch(q) {
  sessionStorage.setItem('ss_query', q);
  sessionStorage.setItem('ss_tab', activeTab);
  saveHistory(q);
  area.innerHTML = '<div class="loading"><span class="spinner"></span>Searching…</div>';
  fetch(`/api/search?q=${encodeURIComponent(q)}&type=${activeTab}`)
    .then(r => r.json())
    .then(data => {
      if (activeTab === 'track')  renderTracks(data, {album:'', cover:'', artist:''});
      if (activeTab === 'artist') renderArtists(data);
      if (activeTab === 'album')  renderAlbums(data);
    })
    .catch(() => { area.innerHTML = '<div class="loading">Search failed — try again.</div>'; });
}

// ── Event delegation — handles all clicks inside results area ─────────────
area.addEventListener('click', e => {
  // Download button (track)
  const dlBtn = e.target.closest('.dl-btn');
  if (dlBtn) {
    queueDl(dlBtn, {
      title:  dlBtn.dataset.title,
      artist: dlBtn.dataset.artist,
      album:  dlBtn.dataset.album,
      cover:  dlBtn.dataset.cover,
    }, dlBtn.dataset.source);
    return;
  }
  // Download-all button (album page)
  const dlAll = e.target.closest('.dl-all-btn, [data-action="dl-all"]');
  if (dlAll) {
    const dataEl = document.getElementById('_album_tracks');
    if (dataEl) queueAll(JSON.parse(dataEl.textContent), dlAll.dataset.source);
    return;
  }
  // Artist card or artist link
  const artistEl = e.target.closest('[data-action="artist"]');
  if (artistEl) {
    loadArtist(artistEl.dataset.id, artistEl.dataset.name);
    return;
  }
  // Album card or album link
  const albumEl = e.target.closest('[data-action="album"]');
  if (albumEl) {
    loadAlbum(albumEl.dataset.id, albumEl.dataset.name, albumEl.dataset.artist, albumEl.dataset.cover);
    return;
  }
});
function renderBreadcrumb() {
  if (!navStack.length) { breadcrumbEl.classList.add('hidden'); return; }
  breadcrumbEl.classList.remove('hidden');
  const parts = [
    `<a onclick="navTo(-1)">Search</a>`,
    ...navStack.map((n, i) =>
      i < navStack.length - 1
        ? `<span class="breadcrumb-sep">›</span><a onclick="navTo(${i})">${esc(n.name)}</a>`
        : `<span class="breadcrumb-sep">›</span><span class="current">${esc(n.name)}</span>`
    ),
  ];
  breadcrumbEl.innerHTML = parts.join('');
}

function navTo(idx) {
  if (idx === -1) {
    navStack = [];
    renderBreadcrumb();
    triggerSearch(input.value.trim());
    return;
  }
  const frame = navStack[idx];
  navStack = navStack.slice(0, idx + 1);
  renderBreadcrumb();
  frame.restore();
}

// ── Track list ────────────────────────────────────────────────────────────
function renderTracks(tracks, albumCtx) {
  if (!tracks || !tracks.length) {
    area.innerHTML = '<div class="empty-state"><div class="empty-icon">🔇</div><p>No tracks found</p></div>';
    return;
  }
  const html = tracks.map(t => trackCardHtml({
    title: t.title,
    artist: t.artist,
    album: t.album || albumCtx.album,
    cover: t.cover || albumCtx.cover,
    duration: t.duration,
    artist_id: t.artist_id,
    album_id: t.album_id,
  })).join('');
  area.innerHTML = `<div class="card-list">${html}</div>`;
}

function trackCardHtml(t, hideDrillLinks) {
  const dur = fmtDur(t.duration);
  const libKey = (t.artist || '').toLowerCase().trim() + '||' + (t.title || '').toLowerCase().trim();
  const inLib = libIndex.has(libKey);
  const artistLink = t.artist_id && !hideDrillLinks
    ? `<span class="track-link" data-action="artist" data-id="${esc(t.artist_id)}" data-name="${esc(t.artist)}">${esc(t.artist)}</span>`
    : esc(t.artist || '');
  const albumLink = t.album_id && !hideDrillLinks
    ? ` · <span class="track-link" data-action="album" data-id="${esc(t.album_id)}" data-name="${esc(t.album)}" data-artist="${esc(t.artist)}" data-cover="${esc(t.cover||'')}">${esc(t.album)}</span>`
    : (t.album ? ` · ${esc(t.album)}` : '');
  return `
  <div class="track-card${inLib ? ' track-in-lib' : ''}">
    ${t.cover
      ? `<img class="cover" src="${esc(t.cover)}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="cover-placeholder" style="display:none">🎵</div>`
      : `<div class="cover-placeholder">🎵</div>`}
    <div class="track-info">
      <div class="track-title">${esc(t.title)}${inLib ? ' <span class="in-lib-badge">✓ Library</span>' : ''}</div>
      <div class="track-sub">${artistLink}${albumLink}</div>
    </div>
    ${dur ? `<span class="track-dur">${dur}</span>` : ''}
    <div class="dl-btns">
      <button class="btn btn-slsk dl-btn"
        data-source="slskd"
        data-title="${esc(t.title)}"
        data-artist="${esc(t.artist||'')}"
        data-album="${esc(t.album||'')}"
        data-cover="${esc(t.cover||'')}">Soulseek</button>
      <button class="btn btn-mono dl-btn"
        data-source="monochrome"
        data-title="${esc(t.title)}"
        data-artist="${esc(t.artist||'')}"
        data-album="${esc(t.album||'')}"
        data-cover="${esc(t.cover||'')}">TIDAL</button>
    </div>
  </div>`;
}

// ── Artist list ───────────────────────────────────────────────────────────
function renderArtists(artists) {
  if (!artists || !artists.length) {
    area.innerHTML = '<div class="empty-state"><div class="empty-icon">🔇</div><p>No artists found</p></div>';
    return;
  }
  const html = artists.map(a => `
    <div class="artist-card" data-action="artist" data-id="${esc(a.id)}" data-name="${esc(a.name)}">
      ${a.picture
        ? `<img class="artist-pic" src="${esc(a.picture)}" alt="" loading="lazy">`
        : `<div class="artist-pic placeholder">👤</div>`}
      <div class="track-info">
        <div class="artist-name">${esc(a.name)}</div>
        ${a.nb_album ? `<div class="artist-sub">${a.nb_album} albums</div>` : ''}
      </div>
      <span class="chevron">›</span>
    </div>`).join('');
  area.innerHTML = `<div class="card-list">${html}</div>`;
}

function loadArtist(id, name) {
  navStack.push({ name, restore: () => loadArtist(id, name) });
  renderBreadcrumb();
  area.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  fetch(`/api/artist/${id}`)
    .then(r => r.json())
    .then(data => renderArtistPage(data))
    .catch(() => { area.innerHTML = '<div class="loading">Failed to load artist.</div>'; });
}

function renderArtistPage(data) {
  if (data.error) { area.innerHTML = `<div class="loading">${esc(data.error)}</div>`; return; }

  const fansStr = data.nb_fan > 1e6
    ? (data.nb_fan / 1e6).toFixed(1) + 'M fans'
    : data.nb_fan > 1e3
    ? Math.round(data.nb_fan / 1e3) + 'K fans'
    : (data.nb_fan || '') + ' fans';

  const hero = `
    <div class="artist-hero">
      ${data.picture
        ? `<img class="artist-hero-img" src="${esc(data.picture)}" alt=""
              onerror="this.style.display='none'">`
        : ''}
      <div class="artist-hero-overlay">
        <div class="artist-hero-name">${esc(data.name)}</div>
        ${data.nb_fan ? `<div class="artist-hero-fans">${fansStr}</div>` : ''}
      </div>
    </div>`;

  let topSection = '';
  if (data.top_tracks && data.top_tracks.length) {
    const rows = data.top_tracks.map((t, i) => {
      const libKey = (t.artist || '').toLowerCase().trim() + '||' + (t.title || '').toLowerCase().trim();
      const inLib = libIndex.has(libKey);
      return `
      <div class="top-track-row${inLib ? ' track-in-lib' : ''}">
        <span class="top-track-num">${i + 1}</span>
        <div class="top-track-info">
          <div class="top-track-title">${esc(t.title)}${inLib ? ' <span class="in-lib-badge">✓</span>' : ''}</div>
          ${t.album ? `<div class="top-track-album">${esc(t.album)}</div>` : ''}
        </div>
        <span class="top-track-dur">${fmtDur(t.duration)}</span>
        <div class="dl-btns">
          <button class="btn btn-slsk dl-btn" data-source="slskd"
            data-title="${esc(t.title)}" data-artist="${esc(t.artist||'')}"
            data-album="${esc(t.album||'')}" data-cover="${esc(t.cover||'')}">SLSK</button>
          <button class="btn btn-mono dl-btn" data-source="monochrome"
            data-title="${esc(t.title)}" data-artist="${esc(t.artist||'')}"
            data-album="${esc(t.album||'')}" data-cover="${esc(t.cover||'')}">TIDAL</button>
        </div>
      </div>`;
    }).join('');
    topSection = `<div class="section-label" style="margin:.9rem 0 .4rem">Popular Tracks</div>
      <div class="top-tracks-list">${rows}</div>`;
  }

  const albumsHtml = (data.albums || []).map(a => `
    <div class="album-card" data-action="album" data-id="${esc(a.id)}" data-name="${esc(a.title)}" data-artist="${esc(data.name)}" data-cover="${esc(a.cover)}">
      ${a.cover
        ? `<img class="album-cover" src="${esc(a.cover)}" alt="" loading="lazy">`
        : `<div class="album-cover-ph">💿</div>`}
      <div class="album-title">${esc(a.title)}</div>
      <div class="album-sub">${a.release_date ? a.release_date.slice(0,4) : ''}${a.nb_tracks ? ` · ${a.nb_tracks} tr` : ''}</div>
    </div>`).join('');
  const albumsSection = albumsHtml
    ? `<div class="section-label" style="margin:.9rem 0 .4rem">Albums</div><div class="album-grid">${albumsHtml}</div>`
    : '';

  area.innerHTML = hero + topSection + albumsSection;
}

// ── Album list ────────────────────────────────────────────────────────────
function renderAlbums(albums) {
  if (!albums || !albums.length) {
    area.innerHTML = '<div class="empty-state"><div class="empty-icon">🔇</div><p>No albums found</p></div>';
    return;
  }
  const html = albums.map(a => `
    <div class="album-card" data-action="album" data-id="${esc(a.id)}" data-name="${esc(a.title)}" data-artist="${esc(a.artist)}" data-cover="${esc(a.cover)}">
      ${a.cover
        ? `<img class="album-cover" src="${esc(a.cover)}" alt="" loading="lazy">`
        : `<div class="album-cover-ph">💿</div>`}
      <div class="album-title">${esc(a.title)}</div>
      <div class="album-sub">${esc(a.artist)}${a.nb_tracks ? ` · ${a.nb_tracks} tracks` : ''}</div>
    </div>`).join('');
  area.innerHTML = `<div class="album-grid">${html}</div>`;
}

function loadAlbum(id, title, artist, cover) {
  navStack.push({ name: title, restore: () => loadAlbum(id, title, artist, cover) });
  renderBreadcrumb();
  area.innerHTML = '<div class="loading"><span class="spinner"></span>Loading…</div>';
  fetch(`/api/album/${id}`)
    .then(r => r.json())
    .then(data => renderAlbumPage(data, cover))
    .catch(() => { area.innerHTML = '<div class="loading">Failed to load album.</div>'; });
}

function renderAlbumPage(data, fallbackCover) {
  if (data.error) { area.innerHTML = `<div class="loading">${esc(data.error)}</div>`; return; }
  const cover = data.cover || fallbackCover || '';
  const allTracks = data.tracks.map(t => ({
    title: t.title, artist: t.artist || data.artist, album: data.title, cover,
  }));

  const header = `
    <script type="application/json" id="_album_tracks">${JSON.stringify(allTracks)}<\/script>
    <div class="album-header">
      ${cover
        ? `<img class="album-header-cover" src="${esc(cover)}" alt="">`
        : `<div class="album-header-cover-ph">💿</div>`}
      <div class="album-header-info">
        <div class="album-header-title">${esc(data.title)}</div>
        <div class="album-header-artist">${esc(data.artist)}</div>
        ${data.release_date ? `<div class="album-sub" style="margin-top:4px">${data.release_date.slice(0,4)}</div>` : ''}
      </div>
    </div>
    <div class="dl-all-row">
      <button class="btn-dl-all btn-slsk dl-all-btn" data-source="slskd">⬇ All via Soulseek</button>
      <button class="btn-dl-all btn-mono dl-all-btn" data-source="monochrome">⬇ All via TIDAL</button>
    </div>`;

  const tracks = data.tracks.map(t => trackCardHtml({
    title: t.title,
    artist: t.artist || data.artist,
    album: data.title,
    cover,
    duration: t.duration,
  }, true)).join('');

  area.innerHTML = header + `<div class="card-list">${tracks}</div>`;
}

// ── Download actions ──────────────────────────────────────────────────────
function queueDl(btn, item, source) {
  btn.textContent = '…';
  btn.disabled = true;
  fetch('/api/download', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      artist: item.artist,
      album: item.album,
      title: item.title,
      cover: item.cover,
      source,
    }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) {
      btn.textContent = '✓';
      btn.classList.add('btn-queued');
      showToast('Queued: ' + item.title);
    } else if (d.skipped) {
      btn.textContent = '✓';
      btn.classList.add('btn-queued');
      showToast(d.message || 'Already in your library');
    } else {
      btn.textContent = '✗';
      showToast('Error: ' + (d.message || d.error || 'Unknown'), 3500);
      setTimeout(() => { btn.textContent = source === 'slskd' ? 'Soulseek' : 'TIDAL'; btn.disabled = false; }, 2000);
    }
  })
  .catch(() => {
    btn.textContent = source === 'slskd' ? 'Soulseek' : 'TIDAL';
    btn.disabled = false;
    showToast('Network error', 3000);
  });
}

function queueAll(tracks, source) {
  showToast(`Queueing ${tracks.length} tracks…`);
  fetch('/api/download/album', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ tracks, source }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) showToast(`Queued ${d.count} tracks via ${source === 'slskd' ? 'Soulseek' : 'TIDAL'} ✓`);
    else showToast('Error: ' + (d.error || 'Unknown'), 3500);
  })
  .catch(() => showToast('Network error', 3000));
}

// ── Helpers ───────────────────────────────────────────────────────────────
function fmtDur(s) {
  if (!s) return '';
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
{% endblock %}
