<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a11">
  <title>slskdsync · Sign in</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-brand">
      <span class="brand-mark" style="width:34px;height:34px;border-radius:10px;">
        <svg viewBox="0 0 24 24" style="width:19px;height:19px;"><g fill="#fff"><rect x="4" y="9" width="3.4" height="6" rx="1.7"/><rect x="10.3" y="4" width="3.4" height="16" rx="1.7"/><rect x="16.6" y="7" width="3.4" height="10" rx="1.7"/></g></svg>
      </span>
      <span class="brand-wordmark" style="font-size:1.3rem;font-weight:800;">slskdsync</span>
    </div>
    <p class="auth-sub">Sign in to continue</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}" style="text-align:left;margin-bottom:12px;">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="post" action="/login">
      <div class="field" style="text-align:left;">
        <label>Username</label>
        <input name="username" type="text" autocomplete="username" autofocus>
      </div>
      <div class="field" style="text-align:left;">
        <label>Password</label>
        <input name="password" type="password" autocomplete="current-password">
      </div>
      <button class="btn-full" type="submit">Sign in</button>
    </form>
    <p class="auth-note">Default credentials: admin / admin</p>
  </div>
</div>
</body>
</html>
