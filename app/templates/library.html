{% extends 'base.html' %}
{% block content %}

<div class="lib-search-wrap">
  <div class="search-inner">
    <input id="lib-q" class="search-input" type="search"
      placeholder="Search library…"
      oninput="filterLib(this.value)" autocomplete="off">
  </div>
  <div class="lib-meta">
    <span id="lib-count"></span>
    <button class="lib-view-btn" id="lib-view-toggle" onclick="toggleView()">Group</button>
    <a href="/library" class="lib-refresh">↺ Rescan</a>
  </div>
</div>

<div id="lib-list"></div>
<div id="lib-empty" class="empty-state" style="display:none">
  <div class="empty-icon">🔇</div>
  <p>No tracks match your search.</p>
</div>
<div id="lib-more-wrap" style="text-align:center;padding:.75rem 0;display:none">
  <button class="qa-btn" id="lib-more-btn" onclick="showMore()">Show more</button>
</div>

{% if not tracks %}
<div class="empty-state">
  <div class="empty-icon">🎵</div>
  <p>No music found in <code>{{ music_path }}</code>.</p>
</div>
{% endif %}

<style>
.lib-search-wrap {
  position: sticky; top: calc(var(--header-h) + var(--inset-top)); z-index: 50;
  background: var(--bg); padding: .6rem 0 .3rem;
}
.lib-meta {
  display: flex; justify-content: space-between; align-items: center; gap: .5rem;
  padding: .2rem .1rem 0; font-size: .72rem; color: var(--text-muted);
}
.lib-refresh { color: var(--accent); }
.lib-view-btn {
  padding: .15rem .45rem; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-muted); font-size: .68rem;
  font-weight: 600; cursor: pointer; transition: all .12s; margin-left: auto;
}
.lib-view-btn:hover, .lib-view-btn.active { border-color: var(--accent); color: var(--accent); }
.artist-group { margin-bottom: .5rem; }
.artist-group summary {
  font-size: .82rem; font-weight: 700; padding: .4rem .5rem;
  background: var(--surface2); border-radius: var(--radius-sm);
  cursor: pointer; list-style: none; display: flex; align-items: center; gap: .5rem;
}
.artist-group summary:hover { background: var(--surface3); }
.artist-group summary::before { content: '›'; color: var(--text-muted); transition: transform .15s; }
.artist-group[open] summary::before { transform: rotate(90deg); }
.album-group { margin: .2rem 0 .2rem .75rem; }
.album-group summary {
  font-size: .75rem; font-weight: 600; padding: .3rem .5rem;
  background: var(--surface); border-radius: var(--radius-sm);
  cursor: pointer; list-style: none; display: flex; align-items: center; gap: .4rem; color: var(--text-muted);
}
.album-group summary:hover { background: var(--surface2); }
.album-group summary::before { content: '›'; transition: transform .15s; }
.album-group[open] summary::before { transform: rotate(90deg); }
.album-tracks { margin: .15rem 0 .15rem 1rem; display: flex; flex-direction: column; gap: .15rem; }
#lib-list { display: flex; flex-direction: column; gap: .25rem; margin-top: .5rem; }
.lib-row {
  display: flex; align-items: center; gap: .6rem;
  background: var(--surface); border-radius: var(--radius-sm);
  padding: .5rem .65rem;
}
.lib-row-info { flex: 1; min-width: 0; }
.lib-row-title {
  font-size: .86rem; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-row-sub {
  font-size: .7rem; color: var(--text-muted); margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-ext {
  font-size: .6rem; font-weight: 700; color: var(--accent);
  background: var(--surface3); border-radius: 3px; padding: 1px 5px;
  flex-shrink: 0; letter-spacing: .02em;
}
.lib-redl-btn {
  flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); color: var(--text-muted);
  font-size: .85rem; padding: .25rem .5rem; cursor: pointer; transition: all .15s;
}
.lib-redl-btn:hover { border-color: var(--accent); color: var(--accent); }
.lib-redl-btn.queued { color: var(--success-text); border-color: #163020; }
</style>

<script>
const ALL_TRACKS = {{ tracks | tojson }};
const PAGE_SIZE = 200;
let filtered = ALL_TRACKS;
let showing = PAGE_SIZE;
let groupedView = localStorage.getItem('lib_grouped') === '1';

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trackRowHtml(t) {
  const size = t.size_mb ? `<span style="font-size:.62rem;color:var(--text-muted);flex-shrink:0">${t.size_mb} MB</span>` : '';
  return `<div class="lib-row">
    <div class="lib-row-info">
      <div class="lib-row-title">${esc(t.title)}</div>
      <div class="lib-row-sub">${esc(t.artist)}${t.album ? ' · ' + esc(t.album) : ''}</div>
    </div>
    ${size}
    <span class="lib-ext">${esc(t.ext)}</span>
    <button class="lib-redl-btn"
      onclick="redownload(this,'${esc(t.artist)}','${esc(t.album)}','${esc(t.title)}')">↺</button>
  </div>`;
}

function renderGrouped(tracks) {
  // Group by artist → album
  const byArtist = {};
  for (const t of tracks) {
    const a = t.artist || '(Unknown Artist)';
    const al = t.album  || '(Unknown Album)';
    if (!byArtist[a]) byArtist[a] = {};
    if (!byArtist[a][al]) byArtist[a][al] = [];
    byArtist[a][al].push(t);
  }
  return Object.entries(byArtist).sort((a,b) => a[0].localeCompare(b[0])).map(([artist, albums]) => {
    const albumHtml = Object.entries(albums).sort((a,b) => a[0].localeCompare(b[0])).map(([album, ts]) =>
      `<details class="album-group">
        <summary>${esc(album)} <span style="font-weight:400;font-size:.68rem">(${ts.length})</span></summary>
        <div class="album-tracks">${ts.map(trackRowHtml).join('')}</div>
      </details>`
    ).join('');
    const total = Object.values(albums).reduce((n, ts) => n + ts.length, 0);
    return `<details class="artist-group" open>
      <summary>${esc(artist)} <span style="font-weight:400;color:var(--text-muted);font-size:.75rem">${total} track${total!==1?'s':''}</span></summary>
      ${albumHtml}
    </details>`;
  }).join('');
}

function render() {
  const list = document.getElementById('lib-list');
  const total = filtered.length;
  document.getElementById('lib-count').textContent =
    (total === ALL_TRACKS.length ? total : `${total} of ${ALL_TRACKS.length}`) +
    ' track' + (total !== 1 ? 's' : '');
  document.getElementById('lib-empty').style.display = total === 0 ? '' : 'none';

  if (groupedView) {
    list.innerHTML = renderGrouped(filtered);
    document.getElementById('lib-more-wrap').style.display = 'none';
    return;
  }

  const slice = filtered.slice(0, showing);
  list.innerHTML = slice.map(trackRowHtml).join('');
  const moreWrap = document.getElementById('lib-more-wrap');
  if (filtered.length > showing) {
    moreWrap.style.display = '';
    document.getElementById('lib-more-btn').textContent =
      `Show more (${filtered.length - showing} remaining)`;
  } else {
    moreWrap.style.display = 'none';
  }
}

function toggleView() {
  groupedView = !groupedView;
  localStorage.setItem('lib_grouped', groupedView ? '1' : '0');
  const btn = document.getElementById('lib-view-toggle');
  btn.textContent = groupedView ? 'Flat' : 'Group';
  btn.classList.toggle('active', groupedView);
  render();
}

function filterLib(q) {
  const term = q.toLowerCase().trim();
  filtered = !term ? ALL_TRACKS : ALL_TRACKS.filter(t =>
    ((t.artist || '') + ' ' + (t.album || '') + ' ' + (t.title || '')).toLowerCase().includes(term)
  );
  showing = PAGE_SIZE;
  render();
}

function showMore() {
  showing += PAGE_SIZE;
  render();
}

function redownload(btn, artist, album, title) {
  btn.textContent = '…';
  btn.disabled = true;
  fetch('/api/library/redownload', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ artist, album, title }),
  })
  .then(r => r.json())
  .then(d => {
    if (d.ok) { btn.textContent = '✓'; btn.classList.add('queued'); }
    else { btn.textContent = '✗'; btn.disabled = false; }
  })
  .catch(() => { btn.textContent = '↺'; btn.disabled = false; });
}

const _vbtn = document.getElementById('lib-view-toggle');
if (_vbtn) { _vbtn.textContent = groupedView ? 'Flat' : 'Group'; _vbtn.classList.toggle('active', groupedView); }
render();
</script>
{% endblock %}
