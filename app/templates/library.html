{% extends 'base.html' %}
{% block content %}

<div class="page-head">
  <h1 class="page-title">Library</h1>
</div>

{% if needs_scan %}
<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
            padding:.6rem .9rem;font-size:.78rem;color:var(--text-muted);margin-bottom:.75rem">
  Library not yet indexed.
  <button onclick="triggerScan(this)" style="margin-left:.5rem;background:var(--accent);color:#080810;
    border:none;border-radius:var(--radius-pill);padding:.2rem .7rem;font-size:.72rem;font-weight:700;cursor:pointer">
    Scan now
  </button>
</div>
{% endif %}

<!-- Top bar: back button (hidden on home) + search + sort -->
<div id="top-bar" style="margin-bottom:.6rem">
  <div id="back-row" style="display:none">
    <button onclick="goBack()" id="back-btn">
      ‹ <span id="back-label">Library</span>
    </button>
    <span id="view-title"></span>
  </div>
  <div style="display:flex;gap:.4rem;align-items:center">
    <input id="lib-search" type="search" placeholder="Search library…" oninput="applyFilters()" style="flex:1">
    <select id="lib-sort" style="display:none;font-size:.72rem;padding:.3rem .5rem;background:var(--surface2);
            color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer"
            onchange="setSortBy(this.value)">
      <option value="title">Title A–Z</option>
      <option value="artist">Artist A–Z</option>
      <option value="album">Album A–Z</option>
      <option value="added">Recently added</option>
    </select>
  </div>
</div>

<!-- AcoustID filter chips (shown only on track views) -->
<div id="aid-filter-row" style="display:none">
  <button class="af-chip active" onclick="setAidFilter('all',this)">All</button>
  <button class="af-chip" onclick="setAidFilter('matched',this)">✓ ≥80%</button>
  <button class="af-chip" onclick="setAidFilter('uncertain',this)">~ 50–79%</button>
  <button class="af-chip" onclick="setAidFilter('mismatch',this)">✗ &lt;50%</button>
  <button class="af-chip" onclick="setAidFilter('unchecked',this)">? Not checked</button>
</div>

<!-- Flagged filter chips -->
<div id="rating-filter-row" style="display:none">
  <button class="af-chip active" onclick="setRatingFilter('all',this)">All</button>
  <button class="af-chip" onclick="setRatingFilter('flagged',this)">⭐ Flagged</button>
  <button class="af-chip" onclick="setRatingFilter('unflagged',this)">Unflagged</button>
</div>

<!-- Format filter chips -->
<div id="fmt-filter-row" style="display:none">
  <button class="af-chip active" onclick="setFmtFilter('all',this)">All</button>
  <button class="af-chip" onclick="setFmtFilter('lossless',this)">Lossless</button>
  <button class="af-chip" onclick="setFmtFilter('lossy',this)">Lossy</button>
</div>

<!-- Bad / wrong-grab filter chips -->
<div id="bad-filter-row" style="display:none">
  <button class="af-chip active" onclick="setBadFilter('all',this)">All</button>
  <button class="af-chip" onclick="setBadFilter('bad',this)">⚑ Bad only</button>
  <button class="af-chip" onclick="setBadFilter('good',this)">Hide bad</button>
</div>

<!-- Verify-all + progress (shown during verification) -->
<div id="verify-row" style="display:none">
  <button id="verify-view-btn" class="lib-sm-btn" onclick="verifyCurrentView()">↻ Verify all in view</button>
  <div id="aid-progress-wrap" style="flex:1;display:none">
    <div style="font-size:.7rem;color:var(--text-muted);margin-bottom:.15rem">
      <span id="aid-progress-text">Identifying…</span>
    </div>
    <div class="aid-progress-bar-wrap">
      <div id="aid-progress-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- Content area -->
<div id="lib-content"></div>

<!-- Track detail modal -->
<div id="track-modal" class="tm-overlay" style="display:none" onclick="if(event.target===this)closeTrackModal()">
  <div class="tm-card">
    <button class="tm-close" onclick="closeTrackModal()" aria-label="Close">✕</button>
    <div class="tm-head">
      <div id="tm-cover"></div>
      <div class="tm-head-info">
        <div id="tm-title" class="tm-title"></div>
        <div id="tm-sub" class="tm-sub"></div>
        <div id="tm-badges" class="tm-badges"></div>
      </div>
    </div>
    <div id="tm-meta" class="tm-meta"></div>
    <div class="tm-actions">
      <button id="tm-flag-btn" class="lib-sm-btn tm-flag" onclick="toggleBad()">⚑ Flag as bad</button>
      <div class="tm-redl-label">Re-download / fix wrong file</div>
      <div class="tm-redl-row">
        <input id="tm-query" type="text" placeholder="search query…">
        <button id="tm-redl-btn" class="lib-sm-btn" onclick="doRedownload()">↺ Re-download</button>
      </div>
      <div class="tm-hint">If the wrong song was grabbed, edit the query and re-download. The existing file is overwritten once a match is found.</div>
      <div id="tm-redl-result" class="tm-result"></div>
    </div>
  </div>
</div>

<style>
.tm-overlay { position:fixed; inset:0; background:rgba(0,0,0,.62); z-index:1000;
  display:flex; align-items:flex-end; justify-content:center; padding:0; }
@media(min-width:600px){ .tm-overlay{ align-items:center; padding:1rem; } }
.tm-card { background:var(--surface-solid); border:1px solid var(--border);
  border-radius:var(--radius-sm) var(--radius-sm) 0 0; width:100%; max-width:480px;
  padding:1.1rem; position:relative; max-height:88dvh; overflow-y:auto; }
@media(min-width:600px){ .tm-card{ border-radius:var(--radius-sm); } }
.tm-close { position:absolute; top:.55rem; right:.6rem; background:none; border:none;
  color:var(--text-muted); font-size:1rem; cursor:pointer; padding:.25rem .45rem; line-height:1; }
.tm-close:hover { color:var(--text); }
.tm-head { display:flex; gap:.8rem; align-items:flex-start; margin-bottom:.9rem; padding-right:1.4rem; }
.tm-head-info { min-width:0; flex:1; }
.tm-title { font-size:1.05rem; font-weight:700; line-height:1.25; }
.tm-sub { font-size:.82rem; color:var(--text-muted); margin-top:.15rem; }
.tm-badges { margin-top:.45rem; display:flex; gap:.35rem; flex-wrap:wrap; align-items:center; }
.tm-meta { display:grid; grid-template-columns:auto 1fr; gap:.32rem .8rem; font-size:.76rem;
  margin-bottom:1rem; padding:.7rem .8rem; background:var(--surface2); border-radius:var(--radius-sm); }
.tm-meta .k { color:var(--text-faint); white-space:nowrap; }
.tm-meta .v { color:var(--text); overflow-wrap:anywhere; font-family:var(--font-mono); }
.tm-redl-label { font-size:.78rem; font-weight:600; margin-bottom:.45rem; }
.tm-redl-row { display:flex; gap:.4rem; }
.tm-redl-row input { flex:1; min-width:0; padding:.45rem .7rem; border-radius:var(--radius-sm);
  border:1px solid var(--border); background:var(--surface2); color:var(--text);
  font-size:.8rem; font-family:var(--font-mono); }
.tm-redl-row input:focus { border-color:var(--accent); outline:none; }
.tm-redl-row .lib-sm-btn { flex-shrink:0; white-space:nowrap; }
.tm-hint { font-size:.68rem; color:var(--text-faint); margin-top:.45rem; line-height:1.4; }
.tm-result { font-size:.76rem; margin-top:.5rem; }
.tm-flag { width:100%; margin-bottom:.9rem; }
.tm-flag.on { background:var(--err); color:#fff; border-color:transparent; }
.bad-mark { color:var(--err); font-size:.82rem; }
.lib-row.bad .lib-row-title { color:var(--err); }
</style>

<script>
const ALL_TRACKS    = {{ tracks | tojson }};
const ALL_PLAYLISTS = {{ playlists | tojson }};

// Navigation state
let view         = 'home';   // home | artists | albums | songs | playlists | artist-albums | album-tracks | playlist-tracks
let ctx          = {};       // {artist, album, jobId, name} depending on view
let aidFilter    = 'all';
let ratingFilter = 'all';
let fmtFilter    = 'all';
let flaggedBadFilter = 'all';
let sortBy       = 'artist';
let songsPage    = 1;
const PAGE_SIZE  = 300;
let aidRunning        = false;
let _verifyingTrackId = null;   // id of the single track currently being verified
let _verifyingBtn     = null;   // button that triggered single-track verify
let _plTracks         = [];     // tracks currently shown in playlist-tracks view

// ── AcoustID ─────────────────────────────────────────────────────────────

function aidBadgeHtml(score) {
  if (score === null || score === undefined) return '';
  if (score < 0) return '<span class="aid-badge aid-gray">ID ?</span>';
  const pct = Math.round(score * 100);
  if (score < 0.5)  return `<span class="aid-badge aid-red">ID ${pct}%</span>`;
  if (score < 0.8)  return `<span class="aid-badge aid-yellow">ID ${pct}%</span>`;
  return `<span class="aid-badge aid-green">ID ${pct}%</span>`;
}

function aidPassesFilter(score) {
  if (aidFilter === 'all')       return true;
  if (aidFilter === 'unchecked') return score === null || score === undefined;
  if (aidFilter === 'matched')   return score != null && score >= 0.8;
  if (aidFilter === 'uncertain') return score != null && score >= 0.5 && score < 0.8;
  if (aidFilter === 'mismatch')  return score != null && score < 0.5;
  return true;
}

function groupWorstAid(tracks) {
  const s = tracks.filter(t => t.acoustid_score != null);
  return s.length ? Math.min(...s.map(t => t.acoustid_score)) : null;
}

function verifyLib(scope, params, btn) {
  if (aidRunning) return;
  if (btn) { btn.disabled=true; btn.textContent='…'; }
  if (scope === 'track' && params.id != null) {
    _verifyingTrackId = params.id;
    _verifyingBtn     = btn || null;
  } else {
    _verifyingTrackId = null;
    _verifyingBtn     = null;
  }
  fetch('/api/library/acoustid', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({scope, ...params}),
  }).then(r=>r.json()).then(d => {
    if (d.error) { alert(d.error); if(btn){btn.disabled=false;btn.textContent='↻ ID';} return; }
    aidRunning = true;
    if (!_verifyingTrackId) {
      document.getElementById('aid-progress-wrap').style.display = '';
      showProgress(0, d.total);
    }
    pollAid();
  }).catch(() => { if(btn){btn.disabled=false;btn.textContent='↻ ID';} });
}

function verifyCurrentView() {
  if (view==='album-tracks')     verifyLib('album',   {artist:ctx.artist, album:ctx.album});
  else if (view==='artist-albums') verifyLib('artist', {artist:ctx.artist});
  else if (view==='playlist-tracks') verifyLib('playlist',{job_id:ctx.jobId});
  else verifyLib('all', {});
}

function showProgress(done, total) {
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('aid-progress-bar').style.width = pct+'%';
  document.getElementById('aid-progress-text').textContent = `Identifying… ${done} / ${total}`;
}

function pollAid() {
  fetch('/api/library/acoustid/status').then(r=>r.json()).then(d => {
    if (!_verifyingTrackId) showProgress(d.done, d.total);
    if (d.in_progress) { setTimeout(pollAid, 2000); return; }
    aidRunning = false;
    document.getElementById('aid-progress-wrap').style.display = 'none';
    fetch('/api/library/acoustid/scores').then(r=>r.json()).then(scores => {
      ALL_TRACKS.forEach(t => {
        if (t.id !== null && Object.prototype.hasOwnProperty.call(scores, t.id))
          t.acoustid_score = scores[t.id];
      });

      const tid  = _verifyingTrackId;
      const vBtn = _verifyingBtn;
      _verifyingTrackId = null;
      _verifyingBtn     = null;

      if (tid != null && Object.prototype.hasOwnProperty.call(scores, tid)) {
        const score   = scores[tid];
        const newHtml = aidBadgeHtml(score);

        // Update the row badge in-place
        const row = document.querySelector(`.lib-row[data-tid="${tid}"]`);
        if (row) {
          const old = row.querySelector('.aid-badge');
          if (old) { if (newHtml) old.outerHTML = newHtml; else old.remove(); }
          else if (newHtml) {
            const extSpan = row.querySelector('.lib-ext');
            if (extSpan) extSpan.insertAdjacentHTML('beforebegin', newHtml);
          }
        }

        // Update modal if it's showing this track
        if (_modalTrack && _modalTrack.id === tid) {
          _modalTrack.acoustid_score = score;
          const badges = document.getElementById('tm-badges');
          if (badges) {
            const old = badges.querySelector('.aid-badge');
            if (old) { if (newHtml) old.outerHTML = newHtml; else old.remove(); }
            else if (newHtml) badges.insertAdjacentHTML('afterbegin', newHtml);
          }
          renderModalMeta(_modalTrack, _modalDiskInfo);
        }

        if (vBtn) { vBtn.disabled = false; vBtn.textContent = '↻ ID'; }
      } else {
        render();
      }
    });
  }).catch(() => setTimeout(pollAid, 5000));
}

// ── Escape ────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── Cover / ext ───────────────────────────────────────────────────────────
function coverHtml(t, size=38) {
  if (t.cover_url)
    return `<img class="lib-cover" src="${esc(t.cover_url)}" width="${size}" height="${size}" alt="" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="lib-cover-ph" style="width:${size}px;height:${size}px;display:none">🎵</div>`;
  return `<div class="lib-cover-ph" style="width:${size}px;height:${size}px">🎵</div>`;
}
function extClass(e){ return ['FLAC','ALAC','WAV','AIFF','AIF'].includes((e||'').toUpperCase()) ? 'lib-ext lossless' : 'lib-ext'; }

// ── Track row ─────────────────────────────────────────────────────────────
function trackRowHtml(t, showArtist=true) {
  const sub = showArtist ? `${esc(t.artist)}${t.album?' · '+esc(t.album):''}` : esc(t.album||'');
  const verifyBtn = t.id!=null
    ? `<button class="lib-sm-btn" style="font-size:.6rem;padding:.15rem .4rem" title="Verify"
         onclick="event.stopPropagation();verifyLib('track',{id:${t.id}},this)">↻ ID</button>` : '';
  return `<div class="lib-row${t.user_rating===1?' flagged':''}${t.flagged_bad?' bad':''}" data-path="${esc(t.path)}"${t.id!=null?` data-tid="${t.id}"`:''} onclick="showTrackInfo(this)" style="cursor:pointer">
    ${coverHtml(t)}
    <div class="lib-row-info">
      <div class="lib-row-title">${esc(t.title||'—')}</div>
      <div class="lib-row-sub">${sub}</div>
    </div>
    <div class="lib-row-right">
      ${t.flagged_bad?'<span class="bad-mark" title="Flagged as bad">⚑</span>':''}
      ${aidBadgeHtml(t.acoustid_score)}
      <span class="${extClass(t.ext)}">${esc(t.ext||'?')}</span>
      ${verifyBtn}
      <button class="lib-sm-btn" style="font-size:.6rem;padding:.15rem .4rem" title="Re-download"
        onclick="event.stopPropagation();redownload(this,${JSON.stringify(t.artist)},${JSON.stringify(t.album)},${JSON.stringify(t.title)})">↺</button>
    </div>
  </div>`;
}

// ── Home / collection menu ────────────────────────────────────────────────
function renderHome() {
  setNav(false);
  const q = searchVal();
  // If searching, go straight to songs view
  if (q) { view='songs'; renderSongs(); return; }
  const artistCount = new Set(ALL_TRACKS.map(t=>t.artist)).size;
  const albumCount  = new Set(ALL_TRACKS.map(t=>t.artist+'\x00'+t.album)).size;
  const icons = [
    {label:'Artists',  icon:'🎤', bg:'#c0392b', count:`${artistCount} artist${artistCount===1?'':'s'}`,  v:'artists'},
    {label:'Albums',   icon:'💿', bg:'#e67e22', count:`${albumCount} album${albumCount===1?'':'s'}`,    v:'albums'},
    {label:'Songs',    icon:'🎵', bg:'#e74c3c', count:`${ALL_TRACKS.length} song${ALL_TRACKS.length===1?'':'s'}`, v:'songs'},
    {label:'Playlists',icon:'📋', bg:'#8e44ad', count:`${ALL_PLAYLISTS.length} playlist${ALL_PLAYLISTS.length===1?'':'s'}`, v:'playlists'},
  ];
  document.getElementById('lib-content').innerHTML =
    `<div class="coll-section-title">Collection</div>` +
    icons.map(i => `
      <div class="coll-row" onclick="navTo('${i.v}')">
        <div class="coll-icon" style="background:${i.bg}">${i.icon}</div>
        <span class="coll-label">${i.label}</span>
        <span class="coll-count">${i.count}</span>
        <span class="coll-chevron">›</span>
      </div>`).join('');
}

// ── Artists list ──────────────────────────────────────────────────────────
function renderArtists() {
  setNav(true, 'Library', 'Artists');
  document.getElementById('verify-row').style.display = 'none';
  const q = searchVal();
  // Group tracks by artist
  const map = {};
  ALL_TRACKS.forEach(t => {
    const a = t.artist || '(Unknown)';
    if (!map[a]) map[a] = [];
    map[a].push(t);
  });
  let artists = Object.keys(map).sort((a,b) => a.localeCompare(b));
  if (q) artists = artists.filter(a =>
    a.toLowerCase().includes(q) || map[a].some(t => (t.album+' '+t.title).toLowerCase().includes(q)));

  if (!artists.length) {
    document.getElementById('lib-content').innerHTML = '<div class="empty-lib">No artists match.</div>';
    return;
  }

  // Group by first letter
  const sections = {};
  artists.forEach(a => {
    const ch = a[0].toUpperCase();
    const key = /[A-Z]/.test(ch) ? ch : '#';
    if (!sections[key]) sections[key] = [];
    sections[key].push(a);
  });
  const letters = Object.keys(sections).sort((a,b) => a==='#' ? 1 : b==='#' ? -1 : a.localeCompare(b));

  const listHtml = letters.map(letter => {
    const rows = sections[letter].map(a => {
      const tracks = map[a];
      const albums = [...new Set(tracks.map(t=>t.album).filter(Boolean))];
      const sub = `${albums.length} album${albums.length===1?'':'s'} · ${tracks.length} track${tracks.length===1?'':'s'}`;
      const aJ  = JSON.stringify(a);
      return `<div class="artist-row" onclick="navTo('artist-albums',{artist:${aJ}})">
        <div class="artist-avatar">🎤</div>
        <div class="artist-info">
          <div class="artist-name">${esc(a)}</div>
          <div class="artist-sub">${sub}</div>
        </div>
        ${aidBadgeHtml(groupWorstAid(tracks))}
        <button class="lib-sm-btn" style="margin-left:.35rem;flex-shrink:0"
          onclick="event.stopPropagation();verifyLib('artist',{artist:${aJ}},this)">↻</button>
        <span class="coll-chevron" style="margin-left:.2rem">›</span>
      </div>`;
    }).join('');
    return `<div id="az-sec-${letter}" class="az-section-hdr">${letter}</div>${rows}`;
  }).join('');

  const sidebarHtml = letters.map(l =>
    `<span class="az-letter" onclick="jumpTo('az-sec-${l}')">${l}</span>`).join('');

  document.getElementById('lib-content').innerHTML =
    `<div class="az-wrap">
       <div class="az-list">${listHtml}</div>
       <div class="az-sidebar">${sidebarHtml}</div>
     </div>`;
}

// ── Artist → albums ───────────────────────────────────────────────────────
function renderArtistAlbums() {
  setNav(true, 'Artists', ctx.artist);
  showVerifyRow();
  const tracks = ALL_TRACKS.filter(t => t.artist === ctx.artist);
  const map = {};
  tracks.forEach(t => {
    const al = t.album || '(Unknown)';
    if (!map[al]) map[al] = {cover_url:t.cover_url, tracks:[]};
    map[al].tracks.push(t);
  });
  const aJ = JSON.stringify(ctx.artist);
  const html = Object.keys(map).sort().map(al => {
    const {cover_url, tracks:at} = map[al];
    const alJ = JSON.stringify(al);
    const cover = `<div class="album-cover-wrap">${cover_url ? `<img src="${esc(cover_url)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="album-ph">💿</div></div>`;
    return `<div class="album-card-lib" onclick="navTo('album-tracks',{artist:ctx.artist,album:${alJ}})">
      ${cover}
      <div class="album-card-title">${esc(al)}</div>
      <div class="album-card-sub">${at.length} track${at.length===1?'':'s'}</div>
      <div class="album-card-actions">
        ${aidBadgeHtml(groupWorstAid(at))}
        <button class="lib-sm-btn" style="margin-left:auto;font-size:.6rem;padding:.15rem .4rem"
          onclick="event.stopPropagation();verifyLib('album',{artist:${aJ},album:${alJ}},this)">↻</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = `<div class="album-grid-lib">${html}</div>`;
}

// ── Albums list ───────────────────────────────────────────────────────────
function renderAlbums() {
  setNav(true, 'Library', 'Albums');
  document.getElementById('verify-row').style.display = 'none';
  const q = searchVal();
  const map = {};
  ALL_TRACKS.forEach(t => {
    const key = JSON.stringify([t.artist||'', t.album||'(Unknown)']);
    if (!map[key]) map[key] = {artist:t.artist||'', album:t.album||'(Unknown)', cover_url:t.cover_url, tracks:[]};
    map[key].tracks.push(t);
  });
  let keys = Object.keys(map).sort((a,b)=>{
    const [,al]=JSON.parse(a),[,bl]=JSON.parse(b); return al.localeCompare(bl);
  });
  if (q) keys = keys.filter(k=>{
    const {artist,album,tracks}=map[k];
    return (artist+' '+album).toLowerCase().includes(q)||tracks.some(t=>t.title.toLowerCase().includes(q));
  });
  if (!keys.length) { document.getElementById('lib-content').innerHTML='<div class="empty-lib">No albums match.</div>'; return; }
  const html = keys.map(k => {
    const {artist,album,cover_url,tracks} = map[k];
    const aJ=JSON.stringify(artist), alJ=JSON.stringify(album);
    const cover = `<div class="album-cover-wrap">${cover_url ? `<img src="${esc(cover_url)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="album-ph">💿</div></div>`;
    return `<div class="album-card-lib" onclick="navTo('album-tracks',{artist:${aJ},album:${alJ}})">
      ${cover}
      <div class="album-card-title">${esc(album)}</div>
      <div class="album-card-sub">${esc(artist)}</div>
      <div class="album-card-actions">
        ${aidBadgeHtml(groupWorstAid(tracks))}
        <button class="lib-sm-btn" style="margin-left:auto;font-size:.6rem;padding:.15rem .4rem"
          onclick="event.stopPropagation();verifyLib('album',{artist:${aJ},album:${alJ}},this)">↻</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = `<div class="album-grid-lib">${html}</div>`;
}

// ── Album → tracks ────────────────────────────────────────────────────────
function renderAlbumTracks() {
  const backLabel = view === 'album-tracks' && ctx._from === 'albums' ? 'Albums' : ctx.artist;
  setNav(true, backLabel, ctx.album);
  showVerifyRow();
  let tracks = ALL_TRACKS
    .filter(t => t.artist===ctx.artist && t.album===ctx.album)
    .filter(t => aidPassesFilter(t.acoustid_score))
    .filter(t => ratingPassesFilter(t.user_rating))
    .filter(t => fmtPassesFilter(t.ext))
    .filter(t => badPassesFilter(t));
  document.getElementById('lib-content').innerHTML = tracks.length
    ? tracks.map(t=>trackRowHtml(t,false)).join('')
    : '<div class="empty-lib">No tracks match filter.</div>';
}

// ── Sort comparator ───────────────────────────────────────────────────────
function sortComparator(a, b) {
  if (sortBy === 'title') return (a.title||'').localeCompare(b.title||'');
  if (sortBy === 'album') return (a.album||'').localeCompare(b.album||'') || (a.title||'').localeCompare(b.title||'');
  if (sortBy === 'added') return (b.indexed_at||'').localeCompare(a.indexed_at||'');
  return (a.artist||'').localeCompare(b.artist||'') || (a.album||'').localeCompare(b.album||'') || (a.title||'').localeCompare(b.title||'');
}
function setSortBy(val) { sortBy = val; songsPage = 1; render(); }

// ── Songs list ────────────────────────────────────────────────────────────
function renderSongs() {
  setNav(true, 'Library', 'Songs');
  showVerifyRow();
  document.getElementById('lib-sort').style.display = '';
  document.getElementById('lib-sort').value = sortBy;
  const q = searchVal();
  const filtered = ALL_TRACKS.filter(t => {
    if (q && !((t.artist+' '+t.album+' '+t.title).toLowerCase().includes(q))) return false;
    return aidPassesFilter(t.acoustid_score) && ratingPassesFilter(t.user_rating) && fmtPassesFilter(t.ext) && badPassesFilter(t);
  });
  const sorted  = [...filtered].sort(sortComparator);
  const visible  = sorted.slice(0, songsPage * PAGE_SIZE);
  const remaining = sorted.length - visible.length;
  const moreBtn  = remaining > 0
    ? `<div style="text-align:center;padding:.75rem 0">
         <button class="lib-sm-btn" style="padding:.3rem .9rem;font-size:.75rem"
           onclick="songsPage++;renderSongs()">Load ${Math.min(remaining,PAGE_SIZE)} more of ${remaining}</button>
       </div>`
    : '';
  document.getElementById('lib-content').innerHTML = sorted.length
    ? `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.35rem">${sorted.length} song${sorted.length===1?'':'s'}</div>`
      + visible.map(t=>trackRowHtml(t)).join('') + moreBtn
    : '<div class="empty-lib">No songs match.</div>';
}

// ── Playlists list ────────────────────────────────────────────────────────
function renderPlaylists() {
  setNav(true, 'Library', 'Playlists');
  document.getElementById('verify-row').style.display = 'none';
  if (!ALL_PLAYLISTS.length) {
    document.getElementById('lib-content').innerHTML='<div class="empty-lib">No playlists imported yet.</div>';
    return;
  }
  const q = searchVal();
  const icons = {spotify:'🟢',apple:'🍎',tidal:'⬛',deezer:'🟠',search:'🔍'};
  const colors = {spotify:'#1DB954',apple:'#fc3c44',tidal:'#000',deezer:'#EF5466',search:'#555'};
  const rows = ALL_PLAYLISTS.filter(p => !q||(p.playlist_name||p.source_url||'').toLowerCase().includes(q)).map(p => {
    const name = p.playlist_name || p.source_url || `Import #${p.id}`;
    const nJ   = JSON.stringify(name);
    const src  = p.source || 'search';
    const bg   = colors[src] || 'var(--surface3)';
    const done = p.done || 0;
    const total = p.total || 0;
    const prog = total > 0 ? `${done} / ${total} downloaded` : 'no tracks';
    return `<div class="playlist-row" onclick="navTo('playlist-tracks',{jobId:${p.id},name:${nJ}})">
      <div class="playlist-icon" style="background:${bg}">${icons[src]||'🎵'}</div>
      <div class="playlist-info">
        <div class="playlist-name">${esc(name)}</div>
        <div class="playlist-sub">${esc(src)} · ${prog}</div>
      </div>
      <button class="lib-sm-btn" style="flex-shrink:0"
        onclick="event.stopPropagation();verifyLib('playlist',{job_id:${p.id}},this)">↻ Verify</button>
      <span class="coll-chevron" style="margin-left:.35rem">›</span>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = rows||'<div class="empty-lib">No playlists match.</div>';
}

// ── Playlist → tracks ─────────────────────────────────────────────────────
function renderPlaylistTracks() {
  setNav(true, 'Playlists', ctx.name);
  showVerifyRow();
  document.getElementById('lib-content').innerHTML = '<div class="empty-lib">Loading…</div>';
  fetch(`/api/library/playlist/${ctx.jobId}`)
    .then(r=>r.json()).then(raw => {
      // Normalise to library-track shape so the detail modal and filters work.
      _plTracks = raw.map(t => {
        const lp = t.local_path || '';
        return {
          id: null,                                  // not a library_index id
          artist: t.artist||'', album: t.album||'', title: t.title||'',
          path: lp,
          ext: lp.includes('.') ? lp.split('.').pop().toUpperCase() : '',
          cover_url: t.cover_url||'',
          acoustid_score: t.acoustid_score,
          user_rating: null, indexed_at: '',
          flagged_bad: !!t.flagged_bad,
        };
      });
      if (!_plTracks.length) {
        document.getElementById('lib-content').innerHTML =
          '<div class="empty-lib">No downloaded tracks yet — check Queue for progress.</div>';
        return;
      }
      const f = _plTracks.filter(t =>
        aidPassesFilter(t.acoustid_score) && ratingPassesFilter(t.user_rating) &&
        fmtPassesFilter(t.ext) && badPassesFilter(t));
      document.getElementById('lib-content').innerHTML = f.length
        ? `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.35rem">${_plTracks.length} track${_plTracks.length===1?'':'s'}</div>`
          + f.map(t=>trackRowHtml(t)).join('')
        : `<div class="empty-lib">${_plTracks.length} track${_plTracks.length===1?'':'s'} downloaded but none match the current filter.</div>`;
    }).catch(()=>{ document.getElementById('lib-content').innerHTML='<div class="empty-lib">Failed to load.</div>'; });
}

// ── Navigation ────────────────────────────────────────────────────────────

// Stack so we can go back through multi-level drill
const navStack = [];

function saveNav() {
  try {
    sessionStorage.setItem('lib_state', JSON.stringify({view, ctx, stack: navStack}));
  } catch(e) {}
}

function navTo(newView, newCtx={}) {
  navStack.push({view, ctx: Object.assign({},ctx)});
  view = newView;
  ctx  = Object.assign({}, newCtx);
  saveNav();
  render();
}

function goBack() {
  if (navStack.length) {
    const prev = navStack.pop();
    view = prev.view;
    ctx  = prev.ctx;
  } else {
    view = 'home'; ctx = {};
    navStack.length = 0;
  }
  saveNav();
  render();
}

function setNav(showBack, backLabel, title) {
  const row  = document.getElementById('back-row');
  const lbl  = document.getElementById('back-label');
  const ttl  = document.getElementById('view-title');
  row.style.display = showBack ? 'flex' : 'none';
  if (showBack) { lbl.textContent = backLabel||'Back'; ttl.textContent = title||''; }
}

function showVerifyRow() {
  document.getElementById('verify-row').style.display = 'flex';
  document.getElementById('aid-filter-row').style.display = 'flex';
  document.getElementById('rating-filter-row').style.display = 'flex';
  document.getElementById('fmt-filter-row').style.display = 'flex';
  document.getElementById('bad-filter-row').style.display = 'flex';
}

function jumpTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Filters ───────────────────────────────────────────────────────────────
function searchVal() { return (document.getElementById('lib-search').value||'').toLowerCase().trim(); }
function applyFilters() {
  songsPage = 1;
  if (view==='home' && searchVal()) navTo('songs'); else render();
}
function setAidFilter(val,btn) {
  aidFilter=val;
  document.querySelectorAll('#aid-filter-row .af-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

const LOSSLESS_EXTS = new Set(['FLAC','ALAC','WAV','AIFF','AIF']);

function setRatingFilter(val,btn) {
  ratingFilter=val;
  document.querySelectorAll('#rating-filter-row .af-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function ratingPassesFilter(r) {
  if (ratingFilter==='all')      return true;
  if (ratingFilter==='flagged')  return r===1;
  if (ratingFilter==='unflagged') return r!==1;
  return true;
}

function setFmtFilter(val,btn) {
  fmtFilter=val;
  document.querySelectorAll('#fmt-filter-row .af-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function fmtPassesFilter(ext) {
  if (fmtFilter==='all')      return true;
  if (fmtFilter==='lossless') return LOSSLESS_EXTS.has((ext||'').toUpperCase());
  if (fmtFilter==='lossy')    return !LOSSLESS_EXTS.has((ext||'').toUpperCase());
  return true;
}

function setBadFilter(val,btn) {
  flaggedBadFilter=val;
  document.querySelectorAll('#bad-filter-row .af-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  songsPage=1;
  render();
}
function badPassesFilter(t) {
  if (flaggedBadFilter==='bad')  return !!t.flagged_bad;
  if (flaggedBadFilter==='good') return !t.flagged_bad;
  return true;
}

// ── Main render ───────────────────────────────────────────────────────────
function render() {
  document.getElementById('aid-filter-row').style.display = 'none';
  document.getElementById('rating-filter-row').style.display = 'none';
  document.getElementById('fmt-filter-row').style.display = 'none';
  document.getElementById('bad-filter-row').style.display = 'none';
  document.getElementById('verify-row').style.display = 'none';
  document.getElementById('lib-sort').style.display = 'none';
  if (view==='home')             renderHome();
  else if (view==='artists')     renderArtists();
  else if (view==='albums')      renderAlbums();
  else if (view==='songs')       renderSongs();
  else if (view==='playlists')   renderPlaylists();
  else if (view==='artist-albums') renderArtistAlbums();
  else if (view==='album-tracks')  renderAlbumTracks();
  else if (view==='playlist-tracks') renderPlaylistTracks();
}

// ── Scan / Re-DL ──────────────────────────────────────────────────────────
function triggerScan(btn) {
  btn.disabled=true; btn.textContent='…';
  fetch('/api/library/scan',{method:'POST'}).then(()=>setTimeout(()=>location.reload(),3000))
    .catch(()=>{btn.disabled=false;btn.textContent='Scan now';});
}
function redownload(btn,artist,album,title) {
  btn.disabled=true; btn.textContent='…';
  fetch('/api/library/redownload',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({artist,album,title})}).then(r=>r.json()).then(d=>{
    btn.textContent = d.ok?'✓':'!';
    setTimeout(()=>{btn.disabled=false;btn.textContent='↺';},3000);
  }).catch(()=>{btn.disabled=false;btn.textContent='↺';});
}

// ── Track detail modal ──────────────────────────────────────────────────────
let _modalTrack    = null;
let _modalDiskInfo = null;   // last disk-info response for the open modal

function fmtDuration(s) {
  const m = Math.floor(s/60), sec = s%60;
  return m + ':' + String(sec).padStart(2,'0');
}

function renderModalMeta(t, d) {
  const rows = [];
  const fmt = (d && d.format) || t.ext || '';
  if (fmt) rows.push(['Format', fmt]);
  if (d && d.size_mb != null)  rows.push(['Size', d.size_mb + ' MB']);
  if (d && d.bitrate)          rows.push(['Bitrate', d.bitrate + ' kbps']);
  if (d && d.duration)         rows.push(['Duration', fmtDuration(d.duration)]);
  if (t.acoustid_score != null)
    rows.push(['AcoustID', t.acoustid_score < 0 ? 'Not identified' : Math.round(t.acoustid_score*100)+'% match']);
  const added = (d && d.indexed_at) || t.indexed_at || '';
  if (added) rows.push(['Added', added.slice(0,10)]);
  const path = (d && d.path) || t.path || '';
  if (path) rows.push(['Path', path]);
  document.getElementById('tm-meta').innerHTML = rows.map(([k,v]) =>
    `<span class="k">${esc(k)}</span><span class="v">${esc(v)}</span>`).join('');
}

function showTrackInfo(rowEl) {
  const path = rowEl.dataset.path || '';
  const t = ALL_TRACKS.find(x => x.path === path)
         || _plTracks.find(x => x.path === path)
         || {path, ext:'', acoustid_score:null};
  _modalTrack    = t;
  _modalDiskInfo = null;
  document.getElementById('tm-cover').innerHTML = coverHtml(t, 72);
  document.getElementById('tm-title').textContent = t.title || '—';
  document.getElementById('tm-sub').textContent = (t.artist||'') + (t.album ? ' · '+t.album : '');
  document.getElementById('tm-badges').innerHTML =
    aidBadgeHtml(t.acoustid_score) + ` <span class="${extClass(t.ext)}">${esc(t.ext||'?')}</span>`;
  document.getElementById('tm-query').value = ((t.artist||'')+' '+(t.title||'')).trim();
  const res = document.getElementById('tm-redl-result'); res.textContent = ''; res.style.color = '';
  const btn = document.getElementById('tm-redl-btn'); btn.disabled = false; btn.textContent = '↺ Re-download';
  updateFlagBtn();
  renderModalMeta(t, null);
  document.getElementById('track-modal').style.display = 'flex';
  if (t.id != null) {
    fetch(`/api/library/track-info/${t.id}`).then(r=>r.json()).then(d=>{
      if (d.ok && _modalTrack === t) { _modalDiskInfo = d; renderModalMeta(t, d); }
    }).catch(()=>{});
  }
}

function closeTrackModal() {
  document.getElementById('track-modal').style.display = 'none';
  _modalTrack    = null;
  _modalDiskInfo = null;
}

function updateFlagBtn() {
  const btn = document.getElementById('tm-flag-btn');
  if (!_modalTrack || !_modalTrack.path) { btn.style.display = 'none'; return; }
  btn.style.display = '';
  if (_modalTrack.flagged_bad) {
    btn.textContent = '⚑ Flagged bad — click to clear';
    btn.classList.add('on');
  } else {
    btn.textContent = '⚑ Flag as bad';
    btn.classList.remove('on');
  }
}

function toggleBad() {
  if (!_modalTrack || !_modalTrack.path) return;
  const next = !_modalTrack.flagged_bad;
  const btn = document.getElementById('tm-flag-btn');
  btn.disabled = true;
  fetch('/api/library/flag-bad', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({path:_modalTrack.path, artist:_modalTrack.artist, title:_modalTrack.title, flagged:next}),
  }).then(r=>r.json()).then(d=>{
    btn.disabled = false;
    if (!d.ok) return;
    _modalTrack.flagged_bad = d.flagged;
    // Keep the underlying ALL_TRACKS object in sync (same ref if from there)
    const lib = ALL_TRACKS.find(x => x.path === _modalTrack.path);
    if (lib) lib.flagged_bad = d.flagged;
    updateFlagBtn();
    render();
  }).catch(()=>{ btn.disabled = false; });
}

function doRedownload() {
  if (!_modalTrack) return;
  const btn = document.getElementById('tm-redl-btn');
  const res = document.getElementById('tm-redl-result');
  const query = document.getElementById('tm-query').value.trim();
  btn.disabled = true; btn.textContent = '…';
  fetch('/api/library/redownload', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({artist:_modalTrack.artist, album:_modalTrack.album, title:_modalTrack.title, query}),
  }).then(r=>r.json()).then(d=>{
    if (d.ok) {
      btn.textContent = '✓ Queued';
      res.style.color = 'var(--ok)';
      res.textContent = 'Re-download queued — track the progress in the Queue tab.';
    } else {
      btn.disabled = false; btn.textContent = '↺ Re-download';
      res.style.color = 'var(--err)';
      res.textContent = '✗ ' + (d.error || 'Failed');
    }
  }).catch(() => {
    btn.disabled = false; btn.textContent = '↺ Re-download';
    res.style.color = 'var(--err)';
    res.textContent = '✗ Network error';
  });
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeTrackModal(); });

// Restore last navigation state from this session (e.g. after switching tabs)
try {
  const saved = JSON.parse(sessionStorage.getItem('lib_state') || 'null');
  if (saved && saved.view && saved.view !== 'home') {
    view = saved.view;
    ctx  = saved.ctx || {};
    if (Array.isArray(saved.stack)) navStack.push(...saved.stack);
  }
} catch(e) {}

render();
</script>

{% endblock %}
