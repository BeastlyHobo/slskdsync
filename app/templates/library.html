{% extends 'base.html' %}
{% block content %}

<div class="page-head">
  <h1 class="page-title">Library</h1>
</div>

{% if needs_scan %}
<div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
            padding:.6rem .9rem;font-size:.78rem;color:var(--text-muted);margin-bottom:.75rem">
  Library not yet indexed.
  <button onclick="triggerScan(this)" style="margin-left:.5rem;background:var(--accent);color:#080810;
    border:none;border-radius:var(--radius-pill);padding:.2rem .7rem;font-size:.72rem;font-weight:700;cursor:pointer">
    Scan now
  </button>
</div>
{% endif %}

<!-- Top bar: back button (hidden on home) + search -->
<div id="top-bar" style="margin-bottom:.6rem">
  <div id="back-row" style="display:none">
    <button onclick="goBack()" id="back-btn">
      ‹ <span id="back-label">Library</span>
    </button>
    <span id="view-title"></span>
  </div>
  <input id="lib-search" type="search" placeholder="Search library…" oninput="applyFilters()">
</div>

<!-- AcoustID filter chips (shown only on track views) -->
<div id="aid-filter-row" style="display:none">
  <button class="af-chip active" onclick="setAidFilter('all',this)">All</button>
  <button class="af-chip" onclick="setAidFilter('matched',this)">✓ ≥80%</button>
  <button class="af-chip" onclick="setAidFilter('uncertain',this)">~ 50–79%</button>
  <button class="af-chip" onclick="setAidFilter('mismatch',this)">✗ &lt;50%</button>
  <button class="af-chip" onclick="setAidFilter('unchecked',this)">? Not checked</button>
</div>

<!-- Verify-all + progress (shown during verification) -->
<div id="verify-row" style="display:none">
  <button id="verify-view-btn" class="lib-sm-btn" onclick="verifyCurrentView()">↻ Verify all in view</button>
  <div id="aid-progress-wrap" style="flex:1;display:none">
    <div style="font-size:.7rem;color:var(--text-muted);margin-bottom:.15rem">
      <span id="aid-progress-text">Identifying…</span>
    </div>
    <div class="aid-progress-bar-wrap">
      <div id="aid-progress-bar" style="width:0%"></div>
    </div>
  </div>
</div>

<!-- Content area -->
<div id="lib-content"></div>

<script>
const ALL_TRACKS    = {{ tracks | tojson }};
const ALL_PLAYLISTS = {{ playlists | tojson }};

// Navigation state
let view       = 'home';   // home | artists | albums | songs | playlists | artist-albums | album-tracks | playlist-tracks
let ctx        = {};       // {artist, album, jobId, name} depending on view
let aidFilter  = 'all';
let aidRunning = false;

// ── AcoustID ─────────────────────────────────────────────────────────────

function aidBadgeHtml(score) {
  if (score === null || score === undefined) return '';
  if (score < 0) return '<span class="aid-badge aid-gray">ID ?</span>';
  const pct = Math.round(score * 100);
  if (score < 0.5)  return `<span class="aid-badge aid-red">ID ${pct}%</span>`;
  if (score < 0.8)  return `<span class="aid-badge aid-yellow">ID ${pct}%</span>`;
  return `<span class="aid-badge aid-green">ID ${pct}%</span>`;
}

function aidPassesFilter(score) {
  if (aidFilter === 'all')       return true;
  if (aidFilter === 'unchecked') return score === null || score === undefined;
  if (aidFilter === 'matched')   return score != null && score >= 0.8;
  if (aidFilter === 'uncertain') return score != null && score >= 0.5 && score < 0.8;
  if (aidFilter === 'mismatch')  return score != null && score < 0.5;
  return true;
}

function groupWorstAid(tracks) {
  const s = tracks.filter(t => t.acoustid_score != null);
  return s.length ? Math.min(...s.map(t => t.acoustid_score)) : null;
}

function verifyLib(scope, params, btn) {
  if (aidRunning) return;
  if (btn) { btn.disabled=true; btn.textContent='…'; }
  fetch('/api/library/acoustid', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({scope, ...params}),
  }).then(r=>r.json()).then(d => {
    if (d.error) { alert(d.error); if(btn){btn.disabled=false;btn.textContent='↻ Verify';} return; }
    aidRunning = true;
    document.getElementById('aid-progress-wrap').style.display = '';
    showProgress(0, d.total);
    pollAid();
  }).catch(() => { if(btn){btn.disabled=false;btn.textContent='↻ Verify';} });
}

function verifyCurrentView() {
  if (view==='album-tracks')     verifyLib('album',   {artist:ctx.artist, album:ctx.album});
  else if (view==='artist-albums') verifyLib('artist', {artist:ctx.artist});
  else if (view==='playlist-tracks') verifyLib('playlist',{job_id:ctx.jobId});
  else verifyLib('all', {});
}

function showProgress(done, total) {
  const pct = total>0 ? Math.round(done/total*100) : 0;
  document.getElementById('aid-progress-bar').style.width = pct+'%';
  document.getElementById('aid-progress-text').textContent = `Identifying… ${done} / ${total}`;
}

function pollAid() {
  fetch('/api/library/acoustid/status').then(r=>r.json()).then(d => {
    showProgress(d.done, d.total);
    if (d.in_progress) { setTimeout(pollAid, 2000); return; }
    aidRunning = false;
    document.getElementById('aid-progress-wrap').style.display = 'none';
    fetch('/api/library/acoustid/scores').then(r=>r.json()).then(scores => {
      ALL_TRACKS.forEach(t => {
        if (t.id !== null && Object.prototype.hasOwnProperty.call(scores, t.id))
          t.acoustid_score = scores[t.id];
      });
      render();
    });
  }).catch(() => setTimeout(pollAid, 5000));
}

// ── Escape ────────────────────────────────────────────────────────────────
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── Cover / ext ───────────────────────────────────────────────────────────
function coverHtml(t, size=38) {
  if (t.cover_url)
    return `<img class="lib-cover" src="${esc(t.cover_url)}" width="${size}" height="${size}" alt="" loading="lazy"
              onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
            <div class="lib-cover-ph" style="width:${size}px;height:${size}px;display:none">🎵</div>`;
  return `<div class="lib-cover-ph" style="width:${size}px;height:${size}px">🎵</div>`;
}
function extClass(e){ return ['FLAC','ALAC','WAV','AIFF','AIF'].includes((e||'').toUpperCase()) ? 'lib-ext lossless' : 'lib-ext'; }

// ── Track row ─────────────────────────────────────────────────────────────
function trackRowHtml(t, showArtist=true) {
  const sub = showArtist ? `${esc(t.artist)}${t.album?' · '+esc(t.album):''}` : esc(t.album||'');
  const verifyBtn = t.id!=null
    ? `<button class="lib-sm-btn" style="font-size:.6rem;padding:.15rem .4rem" title="Verify"
         onclick="event.stopPropagation();verifyLib('track',{id:${t.id}},this)">↻ ID</button>` : '';
  return `<div class="lib-row${t.user_rating===1?' flagged':''}">
    ${coverHtml(t)}
    <div class="lib-row-info">
      <div class="lib-row-title">${esc(t.title||'—')}</div>
      <div class="lib-row-sub">${sub}</div>
    </div>
    <div class="lib-row-right">
      ${aidBadgeHtml(t.acoustid_score)}
      <span class="${extClass(t.ext)}">${esc(t.ext||'?')}</span>
      ${verifyBtn}
      <button class="lib-sm-btn" style="font-size:.6rem;padding:.15rem .4rem" title="Re-download"
        onclick="event.stopPropagation();redownload(this,${JSON.stringify(t.artist)},${JSON.stringify(t.album)},${JSON.stringify(t.title)})">↺</button>
    </div>
  </div>`;
}

// ── Home / collection menu ────────────────────────────────────────────────
function renderHome() {
  setNav(false);
  const q = searchVal();
  // If searching, go straight to songs view
  if (q) { view='songs'; renderSongs(); return; }
  const artistCount = new Set(ALL_TRACKS.map(t=>t.artist)).size;
  const albumCount  = new Set(ALL_TRACKS.map(t=>t.artist+'\x00'+t.album)).size;
  const icons = [
    {label:'Artists',  icon:'🎤', bg:'#c0392b', count:`${artistCount} artist${artistCount===1?'':'s'}`,  v:'artists'},
    {label:'Albums',   icon:'💿', bg:'#e67e22', count:`${albumCount} album${albumCount===1?'':'s'}`,    v:'albums'},
    {label:'Songs',    icon:'🎵', bg:'#e74c3c', count:`${ALL_TRACKS.length} song${ALL_TRACKS.length===1?'':'s'}`, v:'songs'},
    {label:'Playlists',icon:'📋', bg:'#8e44ad', count:`${ALL_PLAYLISTS.length} playlist${ALL_PLAYLISTS.length===1?'':'s'}`, v:'playlists'},
  ];
  document.getElementById('lib-content').innerHTML =
    `<div class="coll-section-title">Collection</div>` +
    icons.map(i => `
      <div class="coll-row" onclick="navTo('${i.v}')">
        <div class="coll-icon" style="background:${i.bg}">${i.icon}</div>
        <span class="coll-label">${i.label}</span>
        <span class="coll-count">${i.count}</span>
        <span class="coll-chevron">›</span>
      </div>`).join('');
}

// ── Artists list ──────────────────────────────────────────────────────────
function renderArtists() {
  setNav(true, 'Library', 'Artists');
  document.getElementById('verify-row').style.display = 'none';
  const q = searchVal();
  // Group tracks by artist
  const map = {};
  ALL_TRACKS.forEach(t => {
    const a = t.artist || '(Unknown)';
    if (!map[a]) map[a] = [];
    map[a].push(t);
  });
  let artists = Object.keys(map).sort((a,b) => a.localeCompare(b));
  if (q) artists = artists.filter(a =>
    a.toLowerCase().includes(q) || map[a].some(t => (t.album+' '+t.title).toLowerCase().includes(q)));

  if (!artists.length) {
    document.getElementById('lib-content').innerHTML = '<div class="empty-lib">No artists match.</div>';
    return;
  }

  // Group by first letter
  const sections = {};
  artists.forEach(a => {
    const ch = a[0].toUpperCase();
    const key = /[A-Z]/.test(ch) ? ch : '#';
    if (!sections[key]) sections[key] = [];
    sections[key].push(a);
  });
  const letters = Object.keys(sections).sort((a,b) => a==='#' ? 1 : b==='#' ? -1 : a.localeCompare(b));

  const listHtml = letters.map(letter => {
    const rows = sections[letter].map(a => {
      const tracks = map[a];
      const albums = [...new Set(tracks.map(t=>t.album).filter(Boolean))];
      const sub = `${albums.length} album${albums.length===1?'':'s'} · ${tracks.length} track${tracks.length===1?'':'s'}`;
      const aJ  = JSON.stringify(a);
      return `<div class="artist-row" onclick="navTo('artist-albums',{artist:${aJ}})">
        <div class="artist-avatar">🎤</div>
        <div class="artist-info">
          <div class="artist-name">${esc(a)}</div>
          <div class="artist-sub">${sub}</div>
        </div>
        ${aidBadgeHtml(groupWorstAid(tracks))}
        <button class="lib-sm-btn" style="margin-left:.35rem;flex-shrink:0"
          onclick="event.stopPropagation();verifyLib('artist',{artist:${aJ}},this)">↻</button>
        <span class="coll-chevron" style="margin-left:.2rem">›</span>
      </div>`;
    }).join('');
    return `<div id="az-sec-${letter}" class="az-section-hdr">${letter}</div>${rows}`;
  }).join('');

  const sidebarHtml = letters.map(l =>
    `<span class="az-letter" onclick="jumpTo('az-sec-${l}')">${l}</span>`).join('');

  document.getElementById('lib-content').innerHTML =
    `<div class="az-wrap">
       <div class="az-list">${listHtml}</div>
       <div class="az-sidebar">${sidebarHtml}</div>
     </div>`;
}

// ── Artist → albums ───────────────────────────────────────────────────────
function renderArtistAlbums() {
  setNav(true, 'Artists', ctx.artist);
  showVerifyRow();
  const tracks = ALL_TRACKS.filter(t => t.artist === ctx.artist);
  const map = {};
  tracks.forEach(t => {
    const al = t.album || '(Unknown)';
    if (!map[al]) map[al] = {cover_url:t.cover_url, tracks:[]};
    map[al].tracks.push(t);
  });
  const aJ = JSON.stringify(ctx.artist);
  const html = Object.keys(map).sort().map(al => {
    const {cover_url, tracks:at} = map[al];
    const alJ = JSON.stringify(al);
    const cover = `<div class="album-cover-wrap">${cover_url ? `<img src="${esc(cover_url)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="album-ph">💿</div></div>`;
    return `<div class="album-card-lib" onclick="navTo('album-tracks',{artist:ctx.artist,album:${alJ}})">
      ${cover}
      <div class="album-card-title">${esc(al)}</div>
      <div class="album-card-sub">${at.length} track${at.length===1?'':'s'}</div>
      <div class="album-card-actions">
        ${aidBadgeHtml(groupWorstAid(at))}
        <button class="lib-sm-btn" style="margin-left:auto;font-size:.6rem;padding:.15rem .4rem"
          onclick="event.stopPropagation();verifyLib('album',{artist:${aJ},album:${alJ}},this)">↻</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = `<div class="album-grid-lib">${html}</div>`;
}

// ── Albums list ───────────────────────────────────────────────────────────
function renderAlbums() {
  setNav(true, 'Library', 'Albums');
  document.getElementById('verify-row').style.display = 'none';
  const q = searchVal();
  const map = {};
  ALL_TRACKS.forEach(t => {
    const key = JSON.stringify([t.artist||'', t.album||'(Unknown)']);
    if (!map[key]) map[key] = {artist:t.artist||'', album:t.album||'(Unknown)', cover_url:t.cover_url, tracks:[]};
    map[key].tracks.push(t);
  });
  let keys = Object.keys(map).sort((a,b)=>{
    const [,al]=JSON.parse(a),[,bl]=JSON.parse(b); return al.localeCompare(bl);
  });
  if (q) keys = keys.filter(k=>{
    const {artist,album,tracks}=map[k];
    return (artist+' '+album).toLowerCase().includes(q)||tracks.some(t=>t.title.toLowerCase().includes(q));
  });
  if (!keys.length) { document.getElementById('lib-content').innerHTML='<div class="empty-lib">No albums match.</div>'; return; }
  const html = keys.map(k => {
    const {artist,album,cover_url,tracks} = map[k];
    const aJ=JSON.stringify(artist), alJ=JSON.stringify(album);
    const cover = `<div class="album-cover-wrap">${cover_url ? `<img src="${esc(cover_url)}" alt="" loading="lazy" onerror="this.style.display='none'">` : ''}<div class="album-ph">💿</div></div>`;
    return `<div class="album-card-lib" onclick="navTo('album-tracks',{artist:${aJ},album:${alJ}})">
      ${cover}
      <div class="album-card-title">${esc(album)}</div>
      <div class="album-card-sub">${esc(artist)}</div>
      <div class="album-card-actions">
        ${aidBadgeHtml(groupWorstAid(tracks))}
        <button class="lib-sm-btn" style="margin-left:auto;font-size:.6rem;padding:.15rem .4rem"
          onclick="event.stopPropagation();verifyLib('album',{artist:${aJ},album:${alJ}},this)">↻</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = `<div class="album-grid-lib">${html}</div>`;
}

// ── Album → tracks ────────────────────────────────────────────────────────
function renderAlbumTracks() {
  const backLabel = view === 'album-tracks' && ctx._from === 'albums' ? 'Albums' : ctx.artist;
  setNav(true, backLabel, ctx.album);
  showVerifyRow();
  let tracks = ALL_TRACKS
    .filter(t => t.artist===ctx.artist && t.album===ctx.album)
    .filter(t => aidPassesFilter(t.acoustid_score));
  document.getElementById('lib-content').innerHTML = tracks.length
    ? tracks.map(t=>trackRowHtml(t,false)).join('')
    : '<div class="empty-lib">No tracks match filter.</div>';
}

// ── Songs list ────────────────────────────────────────────────────────────
function renderSongs() {
  setNav(true, 'Library', 'Songs');
  showVerifyRow();
  const q = searchVal();
  const tracks = ALL_TRACKS.filter(t => {
    if (q && !((t.artist+' '+t.album+' '+t.title).toLowerCase().includes(q))) return false;
    return aidPassesFilter(t.acoustid_score);
  });
  document.getElementById('lib-content').innerHTML = tracks.length
    ? `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.35rem">${tracks.length} song${tracks.length===1?'':'s'}</div>`
      + tracks.map(t=>trackRowHtml(t)).join('')
    : '<div class="empty-lib">No songs match.</div>';
}

// ── Playlists list ────────────────────────────────────────────────────────
function renderPlaylists() {
  setNav(true, 'Library', 'Playlists');
  document.getElementById('verify-row').style.display = 'none';
  if (!ALL_PLAYLISTS.length) {
    document.getElementById('lib-content').innerHTML='<div class="empty-lib">No playlists imported yet.</div>';
    return;
  }
  const q = searchVal();
  const icons = {spotify:'🟢',apple:'🍎',tidal:'⬛',deezer:'🟠',search:'🔍'};
  const colors = {spotify:'#1DB954',apple:'#fc3c44',tidal:'#000',deezer:'#EF5466',search:'#555'};
  const rows = ALL_PLAYLISTS.filter(p => !q||(p.playlist_name||p.source_url||'').toLowerCase().includes(q)).map(p => {
    const name = p.playlist_name || p.source_url || `Import #${p.id}`;
    const nJ   = JSON.stringify(name);
    const src  = p.source || 'search';
    const bg   = colors[src] || 'var(--surface3)';
    const done = p.done || 0;
    const total = p.total || 0;
    const prog = total > 0 ? `${done} / ${total} downloaded` : 'no tracks';
    return `<div class="playlist-row" onclick="navTo('playlist-tracks',{jobId:${p.id},name:${nJ}})">
      <div class="playlist-icon" style="background:${bg}">${icons[src]||'🎵'}</div>
      <div class="playlist-info">
        <div class="playlist-name">${esc(name)}</div>
        <div class="playlist-sub">${esc(src)} · ${prog}</div>
      </div>
      <button class="lib-sm-btn" style="flex-shrink:0"
        onclick="event.stopPropagation();verifyLib('playlist',{job_id:${p.id}},this)">↻ Verify</button>
      <span class="coll-chevron" style="margin-left:.35rem">›</span>
    </div>`;
  }).join('');
  document.getElementById('lib-content').innerHTML = rows||'<div class="empty-lib">No playlists match.</div>';
}

// ── Playlist → tracks ─────────────────────────────────────────────────────
function renderPlaylistTracks() {
  setNav(true, 'Playlists', ctx.name);
  showVerifyRow();
  document.getElementById('lib-content').innerHTML = '<div class="empty-lib">Loading…</div>';
  fetch(`/api/library/playlist/${ctx.jobId}`)
    .then(r=>r.json()).then(tracks => {
      if (!tracks.length) {
        document.getElementById('lib-content').innerHTML =
          '<div class="empty-lib">No downloaded tracks yet — check Queue for progress.</div>';
        return;
      }
      const f = tracks.filter(t=>aidPassesFilter(t.acoustid_score));
      document.getElementById('lib-content').innerHTML = f.length
        ? `<div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.35rem">${tracks.length} track${tracks.length===1?'':'s'}</div>`
          + f.map(t=>`<div class="lib-row">
            ${t.cover_url
              ? `<img class="lib-cover" src="${esc(t.cover_url)}" width="38" height="38" alt="" loading="lazy" onerror="this.style.display='none'">`
              : '<div class="lib-cover-ph">🎵</div>'}
            <div class="lib-row-info">
              <div class="lib-row-title">${esc(t.title||'—')}</div>
              <div class="lib-row-sub">${esc(t.artist||'')}${t.album?' · '+esc(t.album):''}</div>
            </div>
            <div class="lib-row-right">${aidBadgeHtml(t.acoustid_score)}</div>
          </div>`).join('')
        : `<div class="empty-lib">${tracks.length} track${tracks.length===1?'':'s'} downloaded but none match the current filter.</div>`;
    }).catch(()=>{ document.getElementById('lib-content').innerHTML='<div class="empty-lib">Failed to load.</div>'; });
}

// ── Navigation ────────────────────────────────────────────────────────────

// Stack so we can go back through multi-level drill
const navStack = [];

function saveNav() {
  try {
    sessionStorage.setItem('lib_state', JSON.stringify({view, ctx, stack: navStack}));
  } catch(e) {}
}

function navTo(newView, newCtx={}) {
  navStack.push({view, ctx: Object.assign({},ctx)});
  view = newView;
  ctx  = Object.assign({}, newCtx);
  saveNav();
  render();
}

function goBack() {
  if (navStack.length) {
    const prev = navStack.pop();
    view = prev.view;
    ctx  = prev.ctx;
  } else {
    view = 'home'; ctx = {};
    navStack.length = 0;
  }
  saveNav();
  render();
}

function setNav(showBack, backLabel, title) {
  const row  = document.getElementById('back-row');
  const lbl  = document.getElementById('back-label');
  const ttl  = document.getElementById('view-title');
  row.style.display = showBack ? 'flex' : 'none';
  if (showBack) { lbl.textContent = backLabel||'Back'; ttl.textContent = title||''; }
}

function showVerifyRow() {
  const row = document.getElementById('verify-row');
  const aid = document.getElementById('aid-filter-row');
  row.style.display = 'flex';
  aid.style.display = 'flex';
}

function jumpTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ── Filters ───────────────────────────────────────────────────────────────
function searchVal() { return (document.getElementById('lib-search').value||'').toLowerCase().trim(); }
function applyFilters() { if (view==='home' && searchVal()) navTo('songs'); else render(); }
function setAidFilter(val,btn) {
  aidFilter=val;
  document.querySelectorAll('.af-chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Main render ───────────────────────────────────────────────────────────
function render() {
  document.getElementById('aid-filter-row').style.display = 'none';
  document.getElementById('verify-row').style.display = 'none';
  if (view==='home')             renderHome();
  else if (view==='artists')     renderArtists();
  else if (view==='albums')      renderAlbums();
  else if (view==='songs')       renderSongs();
  else if (view==='playlists')   renderPlaylists();
  else if (view==='artist-albums') renderArtistAlbums();
  else if (view==='album-tracks')  renderAlbumTracks();
  else if (view==='playlist-tracks') renderPlaylistTracks();
}

// ── Scan / Re-DL ──────────────────────────────────────────────────────────
function triggerScan(btn) {
  btn.disabled=true; btn.textContent='…';
  fetch('/api/library/scan',{method:'POST'}).then(()=>setTimeout(()=>location.reload(),3000))
    .catch(()=>{btn.disabled=false;btn.textContent='Scan now';});
}
function redownload(btn,artist,album,title) {
  btn.disabled=true; btn.textContent='…';
  fetch('/api/library/redownload',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({artist,album,title})}).then(r=>r.json()).then(d=>{
    btn.textContent = d.ok?'✓':'!';
    setTimeout(()=>{btn.disabled=false;btn.textContent='↺';},3000);
  }).catch(()=>{btn.disabled=false;btn.textContent='↺';});
}

// Restore last navigation state from this session (e.g. after switching tabs)
try {
  const saved = JSON.parse(sessionStorage.getItem('lib_state') || 'null');
  if (saved && saved.view && saved.view !== 'home') {
    view = saved.view;
    ctx  = saved.ctx || {};
    if (Array.isArray(saved.stack)) navStack.push(...saved.stack);
  }
} catch(e) {}

render();
</script>
